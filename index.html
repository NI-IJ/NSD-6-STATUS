<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.webmanifest" />
<title>NSD-6 Control Panel</title>
<style>
:root{
  --base-w:941;
  --base-h:1640;
  --red:#ff1118;
  --green:rgb(20,255,70);
  --text:#f1f1f1;
  --muted:#b7b7bd;
  --dark:#030303;
  --line:#33343a;
  --font-din:"DIN", "DIN Medium", "DIN Alternate", "Arial Narrow", "Roboto Condensed", "Helvetica Neue", Arial, sans-serif;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#000;
  color:var(--text);
  font-family:var(--font-ui);
}
body{overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{-webkit-tap-highlight-color:transparent;cursor:pointer}
.stage{
  position:relative;
  width:min(100vw, 941px);
  margin:0 auto;
  background:#000;
}
.skin{
  display:block;
  width:100%;
  height:auto;
  pointer-events:none;
  user-select:none;
}
.overlay{
  position:absolute;
  inset:0;
  z-index:2;
}
.txt{
  position:absolute;
  font-family:var(--font-din);
  color:var(--text);
  line-height:1.05;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
  letter-spacing:.015em;
}
.txt-mono{font-family:var(--font-mono)}
.txt-red{color:var(--red)}
.txt-green{color:var(--green)}
.txt-muted{color:var(--muted)}
.bold{font-weight:800}
.center{text-align:center}
.f-xs{font-size:1.35vw}
.f-sm{font-size:1.65vw}
.f-md{font-size:2.05vw}
.f-lg{font-size:3.05vw}
.f-xl{font-size:4.15vw}
.hotspot{
  position:absolute;
  border:0;
  padding:0;
  background:transparent;
  color:transparent;
}
.hotspot:active{
  background:rgba(255,255,255,.04);
  border-radius:999px;
}
.active-tab{
  position:absolute;
  top:8.90%;
  height:3.92%;
  border-radius:999px;
  background:linear-gradient(180deg,#ff1c1c,#a90000);
  box-shadow:0 0 20px rgba(255,0,0,.38), inset 0 0 10px rgba(255,255,255,.08);
  pointer-events:none;
  z-index:1;
  transition:left .15s ease,width .15s ease;
}
.preview{
  position:absolute;
  font-family:var(--font-mono);
  color:#e8e8e8;
  line-height:1.32;
  white-space:pre-wrap;
  overflow:hidden;
  pointer-events:none;
  font-size:1.65vw;
}

/* PSD-based overlay coordinates, 941 × 1640 */
#activeTab.dashboard{left:3.10%;width:20.8%}
#activeTab.plan{left:24.5%;width:15.2%}
#activeTab.save{left:40.8%;width:19.4%}
#activeTab.history{left:61.5%;width:16.0%}
#activeTab.settings{left:78.5%;width:18.2%}

#ovExposure{left:9.30%;top:22.12%;width:7.1%}
#ovSlot{left:18.65%;top:21.55%;width:23%}
#ovCategory{left:18.55%;top:24.78%;width:36%}
#ovReady{left:20.35%;top:29.48%;width:13%}

#ovMovement{left:27.0%;top:36.88%;width:50%}
#ovRotation{left:27.0%;top:40.78%;width:34%}
#ovPrevious{left:27.0%;top:44.68%;width:50%}
#ovLastSaved{left:27.0%;top:48.58%;width:50%}

#ovMonth{left:78.0%;top:67.25%;width:14%;text-align:right}
#ovSessions{left:17.2%;top:71.65%;width:9%}
#ovRests{left:42.2%;top:71.65%;width:9%}
#ovStreak{left:67.7%;top:71.65%;width:9%}
#ovBlock{left:30.3%;top:77.35%;width:43%}
#ovUptime{left:78.5%;top:77.35%;width:13%;text-align:right}
#ovPreview{left:8.25%;top:84.55%;width:83.5%;height:5.5%}

/* Hotspots */
#hsDashboard{left:3.10%;top:8.90%;width:20.8%;height:3.92%}
#hsPlan{left:24.5%;top:8.90%;width:15.2%;height:3.92%}
#hsSave{left:40.8%;top:8.90%;width:19.4%;height:3.92%}
#hsHistory{left:61.5%;top:8.90%;width:16.0%;height:3.92%}
#hsSettings{left:78.5%;top:8.90%;width:18.2%;height:3.92%}

#hsGenerateMain{left:5.8%;top:52.8%;width:87.2%;height:5.35%}
#hsAdvance{left:5.8%;top:59.38%;width:42.7%;height:5.45%}
#hsRest{left:50.4%;top:59.38%;width:42.7%;height:5.45%}
#hsEditTemplate{left:70.7%;top:81.65%;width:22.2%;height:2.7%}
#hsGenerateBottom{left:5.8%;top:91.85%;width:27.8%;height:4.42%}
#hsCopy{left:35.1%;top:91.85%;width:27.0%;height:4.42%}
#hsSaveBottom{left:63.3%;top:91.85%;width:29.8%;height:4.42%}

/* Panels */
.panel{
  display:none;
  position:fixed;
  inset:0;
  z-index:20;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(12px);
  padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));
  overflow:auto;
}
.panel.active{display:block}
.card{
  width:min(920px,100%);
  margin:0 auto 16px;
  border:1px solid var(--line);
  border-radius:18px;
  background:linear-gradient(180deg,#0a0a0c,#030303);
  padding:16px;
  box-shadow:0 0 30px rgba(255,0,0,.12);
}
.panel-title{
  margin:0 0 14px;
  color:var(--red);
  font-family:var(--font-din);
  font-weight:800;
  font-size:20px;
  letter-spacing:.08em;
}
label{
  display:block;
  color:var(--muted);
  font-family:var(--font-din);
  margin:12px 0 7px;
  font-size:13px;
}
textarea,input,select{
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  background:#030303;
  color:#fff;
  padding:12px;
  outline:none;
  font-family:var(--font-mono);
  font-size:14px;
}
textarea{
  min-height:220px;
  resize:vertical;
  line-height:1.45;
}
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}
.actions button,.panel-btn{
  min-height:48px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#050505;
  color:#fff;
  font-family:var(--font-din);
  font-weight:800;
}
.actions .red,.panel-btn.red{
  background:linear-gradient(180deg,#f00909,#9f0000);
  border-color:#ff1f1f;
}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.list{display:grid;gap:10px}
.logitem{
  border:1px solid var(--line);
  border-radius:12px;
  background:#060606;
  padding:12px;
}
.logitem h3{
  margin:0 0 8px;
  font-family:var(--font-din);
  font-size:15px;
}
.logitem pre{
  margin:0;
  white-space:pre-wrap;
  color:#d8d8d8;
  font-family:var(--font-mono);
  font-size:12px;
  line-height:1.42;
  max-height:170px;
  overflow:auto;
}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(22px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:30;
  opacity:0;
  transition:.18s;
  border:1px solid #444;
  border-radius:999px;
  background:#111;
  color:#fff;
  padding:11px 16px;
  font-family:var(--font-din);
}
.toast.show{opacity:1}

@media(min-width:942px){
  .f-xs{font-size:13px}
  .f-sm{font-size:15.5px}
  .f-md{font-size:19.2px}
  .f-lg{font-size:28.5px}
  .f-xl{font-size:39px}
  .preview{font-size:15.5px}
}
@media(max-width:700px){
  .actions{grid-template-columns:1fr}
  .formgrid{grid-template-columns:1fr}
  .card{border-radius:14px}
}
</style>
</head>
<body>
<div class="stage">
  <img src="BASE.png" class="skin" alt="NSD-6 Control Panel" />
  <div class="overlay">
    <div id="activeTab" class="active-tab dashboard"></div>

    <div id="ovExposure" class="txt f-xl txt-red bold center">E1</div>
    <div id="ovSlot" class="txt f-md txt-muted bold">PULL</div>
    <div id="ovCategory" class="txt f-lg bold">HORIZONTAL PULL</div>
    <div id="ovReady" class="txt f-md txt-green bold">● READY</div>

    <div id="ovMovement" class="txt f-md bold">-</div>
    <div id="ovRotation" class="txt f-md">-</div>
    <div id="ovPrevious" class="txt f-md">-</div>
    <div id="ovLastSaved" class="txt f-md">-</div>

    <div id="ovMonth" class="txt f-md txt-muted">MAY 2026</div>
    <div id="ovSessions" class="txt f-xl bold">0</div>
    <div id="ovRests" class="txt f-xl bold">0</div>
    <div id="ovStreak" class="txt f-xl bold">0</div>
    <div id="ovBlock" class="txt f-md txt-green bold">NSD-6 ROTATION ACTIVE</div>
    <div id="ovUptime" class="txt f-sm txt-muted">0d 00h</div>
    <div id="ovPreview" class="preview">Generate a runtime prompt first.</div>

    <button id="hsDashboard" class="hotspot" onclick="setTab('dashboard')">Dashboard</button>
    <button id="hsPlan" class="hotspot" onclick="setTab('plan')">Plan</button>
    <button id="hsSave" class="hotspot" onclick="setTab('save')">Save Log</button>
    <button id="hsHistory" class="hotspot" onclick="setTab('history')">History</button>
    <button id="hsSettings" class="hotspot" onclick="setTab('settings')">Settings</button>

    <button id="hsGenerateMain" class="hotspot" onclick="generatePrompt()">Generate</button>
    <button id="hsAdvance" class="hotspot" onclick="advanceRotation()">Advance</button>
    <button id="hsRest" class="hotspot" onclick="markRest()">Rest</button>
    <button id="hsEditTemplate" class="hotspot" onclick="setTab('settings')">Edit</button>
    <button id="hsGenerateBottom" class="hotspot" onclick="generatePrompt()">Generate</button>
    <button id="hsCopy" class="hotspot" onclick="copyPrompt()">Copy</button>
    <button id="hsSaveBottom" class="hotspot" onclick="setTab('save')">Save</button>
  </div>
</div>

<section id="planPanel" class="panel">
  <div class="card">
    <h2 class="panel-title">RUNTIME PROMPT</h2>
    <textarea id="runtimePrompt" placeholder="Generate Runtime Prompt"></textarea>
    <div class="actions">
      <button class="red" onclick="generatePrompt()">GENERATE</button>
      <button onclick="copyPrompt()">COPY</button>
      <button onclick="setTab('dashboard')">DASHBOARD</button>
    </div>
  </div>
</section>

<section id="savePanel" class="panel">
  <div class="card">
    <h2 class="panel-title">SAVE FINAL LOG</h2>
    <div class="formgrid">
      <div><label>Date</label><input id="logDate" type="date" /></div>
      <div>
        <label>Result</label>
        <select id="result">
          <option>Completed</option>
          <option>Repeat Same</option>
          <option>Graduated</option>
          <option>Transition</option>
          <option>Rest / Delay</option>
        </select>
      </div>
    </div>
    <label>Final log text</label>
    <textarea id="finalLog" placeholder="Paste Kai final log here"></textarea>
    <div class="actions">
      <button class="red" onclick="saveFinalLog()">SAVE SESSION</button>
      <button onclick="document.getElementById('finalLog').value=''">CLEAR</button>
      <button onclick="setTab('dashboard')">DASHBOARD</button>
    </div>
  </div>
</section>

<section id="historyPanel" class="panel">
  <div class="card">
    <h2 class="panel-title">HISTORY</h2>
    <div class="formgrid">
      <div><label>Line filter</label><select id="filter" onchange="renderHistory()"><option value="all">All</option></select></div>
      <div><label>Search</label><input id="search" oninput="renderHistory()" placeholder="FL Row, Burpee, 5/25" /></div>
    </div>
    <div class="list" id="historyList"></div>
    <div class="actions">
      <button onclick="exportData()">BACKUP</button>
      <button onclick="document.getElementById('importFile').click()">IMPORT</button>
      <button onclick="setTab('dashboard')">DASHBOARD</button>
    </div>
    <input id="importFile" type="file" accept="application/json" hidden onchange="importData(event)" />
  </div>
</section>

<section id="settingsPanel" class="panel">
  <div class="card">
    <h2 class="panel-title">SETTINGS</h2>
    <label>Rotation index</label>
    <input type="number" id="rotationIndex" min="0">
    <label>Rotation JSON</label>
    <textarea id="rotationJson"></textarea>
    <button class="panel-btn red" onclick="saveRotation()">SAVE ROTATION</button>
    <label>Lines JSON</label>
    <textarea id="linesJson"></textarea>
    <button class="panel-btn red" onclick="saveLines()">SAVE LINES</button>
    <div class="actions">
      <button onclick="exportData()">EXPORT</button>
      <button onclick="resetAll()">RESET</button>
      <button onclick="setTab('dashboard')">DASHBOARD</button>
    </div>
  </div>
</section>

<div id="toast" class="toast">Saved</div>

<script>
const DEFAULT = {
  createdAt: Date.now(),
  rotationIndex: 0,
  activeTab: "dashboard",
  rotation: [
    {slot:"Push", lineKey:"pushHorizontal"},
    {slot:"Pull", lineKey:"pullVertical"},
    {slot:"Complex Push", lineKey:"complexPush"},
    {slot:"Conditioning", lineKey:"conditioning"},
    {slot:"Push", lineKey:"pushVertical"},
    {slot:"Pull", lineKey:"pullHorizontal"},
    {slot:"Complex Pull", lineKey:"complexPull"},
    {slot:"Conditioning", lineKey:"conditioning"}
  ],
  lines: {
    pushVertical:{
      category:"Vertical Push",
      exercise:"PHSPU",
      progress:"5.5 (5×5) [E1]",
      exposure:"E1",
      staticPosition:"Adv. PL 6s / Adv. L-sit 6s",
      mainTemplate:"PHSPU 5.5 (5×5) [E1]\n:"
    },
    pushHorizontal:{
      category:"Horizontal Push",
      exercise:"Str. PL PU",
      progress:"3.5 (3×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. PL 6s / Adv. L-sit 6s",
      mainTemplate:"Str. PL PU 3.5 (3×5) [E2]\n:"
    },
    pullVertical:{
      category:"Vertical Pull",
      exercise:"OAP Negative",
      progress:"3.5 (3×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. FL 6s / Adv. L-sit 6s",
      mainTemplate:"OAP Negative 3.5 (3×5) [E2]\n:"
    },
    pullHorizontal:{
      category:"Horizontal Pull",
      exercise:"FL Row",
      progress:"3.5 (3×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. FL 6s / Adv. L-sit 6s",
      mainTemplate:"FL Row 3.5 (3×5) [E2]\n:"
    },
    complexPush:{
      category:"Complex Push",
      exercise:"BAPL60",
      progress:"5.5 (5×5) [E1]",
      exposure:"E1",
      staticPosition:"Adv. PL 6s / Adv. L-sit 6s",
      mainTemplate:"BAPL60 5.5 (5×5) [E1]\n:"
    },
    complexPull:{
      category:"Complex Pull",
      exercise:"Str. 360 Pull",
      progress:"5.5 (5×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. FL 6s / Adv. L-sit 6s",
      mainTemplate:"Str. 360 Pull 5.5 (5×5) [E2]\n:"
    },
    conditioning:{
      category:"Conditioning",
      exercise:"Negative + A. Pistol / Burpee",
      progress:"3.3 (3×3) [E1] + Burpee 40x3",
      exposure:"E1",
      staticPosition:"Adv. BL 6s / Adv. L-sit 6s",
      mainTemplate:"Negative + A. Pistol 3.3 (3x3) [E1]\n:\n\nBurpee 40x3\n:"
    }
  },
  logs:[]
};

const STORAGE_KEY = "nsd6_v044";
const LEGACY_KEYS = ["nsd6_v043","nsd6_v042","nsd6_v041","nsd6_v03","nsd6_v02"];

function clone(obj){return JSON.parse(JSON.stringify(obj))}
function deepMerge(base, incoming){
  const out = clone(base);
  if(!incoming || typeof incoming !== "object") return out;
  Object.keys(incoming).forEach(k=>{
    if(incoming[k] && typeof incoming[k] === "object" && !Array.isArray(incoming[k]) && out[k] && typeof out[k] === "object" && !Array.isArray(out[k])){
      out[k] = deepMerge(out[k], incoming[k]);
    } else {
      out[k] = incoming[k];
    }
  });
  return out;
}
function applyDefaults(state){
  const out = deepMerge(DEFAULT, state || {});
  out.rotation = clone(DEFAULT.rotation);
  Object.keys(DEFAULT.lines).forEach(key=>{
    out.lines[key] = {...(out.lines[key] || {}), ...DEFAULT.lines[key]};
  });
  if(!Number.isInteger(out.rotationIndex)) out.rotationIndex = 0;
  out.rotationIndex = ((out.rotationIndex % out.rotation.length) + out.rotation.length) % out.rotation.length;
  if(!["dashboard","plan","save","history","settings"].includes(out.activeTab)) out.activeTab = "dashboard";
  return out;
}
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY) || LEGACY_KEYS.map(k=>localStorage.getItem(k)).find(Boolean);
    return raw ? applyDefaults(JSON.parse(raw)) : clone(DEFAULT);
  }catch(e){
    return clone(DEFAULT);
  }
}
let state = load();
function persist(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state))}

function todayISO(){
  const d = new Date();
  const z = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return z.toISOString().slice(0,10);
}
function week(d){return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d+"T00:00:00").getDay()]}
function titleDate(d){
  const x = new Date(d+"T00:00:00");
  return `${x.getMonth()+1}/${x.getDate()} ${week(d)}`;
}
function nextMeta(){
  const idx = ((state.rotationIndex % state.rotation.length) + state.rotation.length) % state.rotation.length;
  const r = state.rotation[idx];
  return {...r, ...(state.lines[r.lineKey] || {}), rotIndex:idx};
}
function previousLog(meta){
  return [...state.logs].reverse().find(l=>l.lineKey===meta.lineKey || l.exercise===meta.exercise);
}
function lastSaved(){
  return [...state.logs].reverse().find(l=>l.result !== "Rest / Delay") || state.logs[state.logs.length-1];
}
function buildPlan(meta, d=todayISO()){
  return `${titleDate(d)} — ${meta.slot}

Session time: ~

WU
FR full body
HSPU ×3
Wall Extension 10×2
Band Dislocate 10×2
Static Position
: ${meta.staticPosition || "___ / Adv. L-sit 6s"} —
L Pull-up 5×1

MN
${meta.mainTemplate || `${meta.exercise} ${meta.progress}\n:`}

CD
HVR 10×1
Wall Extension 10×1
Band Dislocate
: dorsal 6×1 —
: overgrip 6×1 —
Passive ROM 6

Notes
:`;
}

function setTab(tab){
  state.activeTab = tab;
  persist();
  document.getElementById("activeTab").className = "active-tab " + tab;
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  const panelMap = {
    plan:"planPanel",
    save:"savePanel",
    history:"historyPanel",
    settings:"settingsPanel"
  };
  if(panelMap[tab]) document.getElementById(panelMap[tab]).classList.add("active");
  render();
}

function generatePrompt(){
  const meta = nextMeta();
  const prev = previousLog(meta);
  const prompt = `${prev ? prev.logText : `[No previous ${meta.exercise} log saved yet.]`}

⸻

${buildPlan(meta)}

⸻`;
  document.getElementById("runtimePrompt").value = prompt;
  document.getElementById("ovPreview").textContent = prompt.split("\n").slice(0,5).join("\n");
  setTab("plan");
  toast("Runtime prompt generated");
}
async function copyPrompt(){
  let t = document.getElementById("runtimePrompt").value;
  if(!t.trim()){
    const meta = nextMeta();
    const prev = previousLog(meta);
    t = `${prev ? prev.logText : `[No previous ${meta.exercise} log saved yet.]`}

⸻

${buildPlan(meta)}

⸻`;
    document.getElementById("runtimePrompt").value = t;
    document.getElementById("ovPreview").textContent = t.split("\n").slice(0,5).join("\n");
  }
  try{
    await navigator.clipboard.writeText(t);
    toast("Copied");
  }catch(e){
    document.getElementById("runtimePrompt").select();
    document.execCommand("copy");
    toast("Copied");
  }
}
function render(){
  const meta = nextMeta();
  const prev = previousLog(meta);
  const last = lastSaved();

  text("ovExposure", meta.exposure || "E");
  text("ovSlot", (meta.slot || "-").toUpperCase());
  text("ovCategory", (meta.category || "-").toUpperCase());
  text("ovMovement", `${meta.exercise || "-"} ${meta.progress || ""}`.trim());
  text("ovRotation", `Session ${meta.rotIndex + 1} / ${state.rotation.length}`);
  text("ovPrevious", prev ? `${prev.exercise} ${prev.progress}` : "-");
  text("ovLastSaved", last ? `${last.date} · ${last.exercise}` : "-");

  const now = new Date();
  text("ovMonth", now.toLocaleString("en",{month:"short"}).toUpperCase()+" "+now.getFullYear());

  const ym = todayISO().slice(0,7);
  const month = state.logs.filter(l=>(l.date||"").startsWith(ym));
  text("ovSessions", month.filter(l=>l.result !== "Rest / Delay").length);
  text("ovRests", month.filter(l=>l.result === "Rest / Delay").length);

  let streak = 0;
  for(const l of [...state.logs].reverse()){
    if(l.result === "Rest / Delay") break;
    streak++;
  }
  text("ovStreak", streak);

  const hours = Math.floor((Date.now() - (state.createdAt || Date.now())) / 3600000);
  text("ovUptime", `${Math.floor(hours/24)}d ${String(hours%24).padStart(2,"0")}h`);

  document.getElementById("activeTab").className = "active-tab " + state.activeTab;
  document.getElementById("logDate").value ||= todayISO();
  fillFilters();
  fillSettings();
  renderHistory();
}
function text(id,value){document.getElementById(id).textContent = value}

function saveFinalLog(){
  const meta = nextMeta();
  const txt = document.getElementById("finalLog").value.trim();
  const result = document.getElementById("result").value;
  if(!txt && result !== "Rest / Delay"){
    toast("Paste final log first");
    return;
  }
  const date = document.getElementById("logDate").value || todayISO();
  state.logs.push({
    id:String(Date.now()) + Math.random().toString(16).slice(2),
    date,
    result,
    slot:meta.slot,
    lineKey:meta.lineKey,
    category:meta.category,
    exercise:meta.exercise,
    progress:meta.progress,
    logText: txt || `${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${meta.exercise} delayed.`
  });
  if(result !== "Repeat Same"){
    state.rotationIndex = (state.rotationIndex + 1) % state.rotation.length;
  }
  document.getElementById("finalLog").value = "";
  state.activeTab = "dashboard";
  persist();
  render();
  setTab("dashboard");
  toast("Session saved");
}
function advanceRotation(){
  state.rotationIndex = (state.rotationIndex + 1) % state.rotation.length;
  persist();
  render();
  toast("Rotation advanced");
}
function markRest(){
  const meta = nextMeta();
  const date = todayISO();
  state.logs.push({
    id:String(Date.now()),
    date,
    result:"Rest / Delay",
    slot:meta.slot,
    lineKey:meta.lineKey,
    category:meta.category,
    exercise:meta.exercise,
    progress:meta.progress,
    logText:`${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${meta.exercise} delayed.`
  });
  persist();
  render();
  toast("Rest / Delay saved");
}
function fillFilters(){
  const f = document.getElementById("filter");
  if(!f) return;
  const old = f.value || "all";
  f.innerHTML = '<option value="all">All</option>' + Object.entries(state.lines).map(([k,v])=>`<option value="${k}">${v.category} — ${v.exercise}</option>`).join("");
  f.value = old;
}
function renderHistory(){
  const list = document.getElementById("historyList");
  if(!list) return;
  const f = document.getElementById("filter")?.value || "all";
  const q = (document.getElementById("search")?.value || "").toLowerCase();
  const logs = [...state.logs].reverse().filter(l=>(f === "all" || l.lineKey === f) && JSON.stringify(l).toLowerCase().includes(q));
  list.innerHTML = logs.length ? "" : "<div class='logitem'>No logs yet.</div>";
  logs.slice(0,80).forEach(l=>{
    const div = document.createElement("div");
    div.className = "logitem";
    div.innerHTML = `
      <h3>${esc(l.date)} · ${esc(l.exercise)} · ${esc(l.result)}</h3>
      <pre>${esc((l.logText || "").split("\n").slice(0,10).join("\n"))}</pre>
      <div class="actions">
        <button onclick="copyLog('${l.id}')">COPY</button>
        <button onclick="deleteLog('${l.id}')">DELETE</button>
        <button onclick="reuseLog('${l.id}')">USE AS PREV</button>
      </div>
    `;
    list.appendChild(div);
  });
}
async function copyLog(id){
  const l = state.logs.find(x=>x.id===id);
  if(!l) return;
  await navigator.clipboard.writeText(l.logText);
  toast("Log copied");
}
function reuseLog(id){
  const l = state.logs.find(x=>x.id===id);
  if(!l) return;
  document.getElementById("runtimePrompt").value = `${l.logText}

⸻

${buildPlan(nextMeta())}

⸻`;
  setTab("plan");
  toast("Loaded");
}
function deleteLog(id){
  if(!confirm("Delete this log?")) return;
  state.logs = state.logs.filter(x=>x.id!==id);
  persist();
  render();
  toast("Deleted");
}
function fillSettings(){
  document.getElementById("rotationIndex").value = state.rotationIndex;
  document.getElementById("rotationJson").value = JSON.stringify(state.rotation,null,2);
  document.getElementById("linesJson").value = JSON.stringify(state.lines,null,2);
}
function saveRotation(){
  try{
    state.rotationIndex = Number(document.getElementById("rotationIndex").value) || 0;
    state.rotation = JSON.parse(document.getElementById("rotationJson").value);
    persist();
    render();
    toast("Rotation saved");
  }catch(e){toast("Invalid JSON")}
}
function saveLines(){
  try{
    state.lines = JSON.parse(document.getElementById("linesJson").value);
    persist();
    render();
    toast("Lines saved");
  }catch(e){toast("Invalid JSON")}
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `nsd6_backup_${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      state = applyDefaults(JSON.parse(r.result));
      persist();
      render();
      toast("Imported");
    }catch(err){toast("Import failed")}
  };
  r.readAsText(file);
}
function resetAll(){
  if(!confirm("Reset app data? Export backup first.")) return;
  state = clone(DEFAULT);
  persist();
  render();
  toast("Reset");
}
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1400);
}
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
render();
setTab(state.activeTab || "dashboard");
</script>
</body>
</html>
