.panel{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.9);backdrop-filter:none !important;padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));overflow:auto}
.panel.active{display:block}
.card{width:min(920px,100%);margin:0 auto 16px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0a0a0c,#030303);padding:16px;box-shadow:0 0 30px rgba(255,0,0,.12)}
.panel-title{margin:0 0 14px;color:var(--red);font-family:var(--font-din);font-weight:500;font-size:20px;letter-spacing:.08em}
label{display:block;color:var(--muted);font-family:var(--font-din);margin:12px 0 7px;font-size:13px}

textarea{min-height:220px;resize:vertical;line-height:1.45}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.actions button,.panel-btn{min-height:48px;border:1px solid var(--line);border-radius:10px;background:#050505;color:#fff;font-family:var(--font-din);font-weight:500}
.actions .redbtn,.panel-btn.redbtn{background:linear-gradient(180deg,#f00909,#9f0000);border-color:#ff1f1f}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.list{display:grid;gap:10px}
.logitem{border:1px solid var(--line);border-radius:12px;background:#060606;padding:12px}
.logitem h3{margin:0 0 8px;font-family:var(--font-din);font-size:15px;font-weight:500}
.logitem pre{margin:0;white-space:pre-wrap;color:#d8d8d8;font-family:var(--font-mono);font-size:12px;line-height:1.42;max-height:170px;overflow:auto}
.panel-headline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.panel-headline .panel-title{margin:0;color:var(--red);font-family:var(--font-din);font-weight:500;font-size:20px;letter-spacing:.08em}
.mini-close{border:1px solid var(--line);border-radius:999px;background:#050505;color:#fff;padding:8px 14px;font-family:var(--font-din)}
.history-card{max-height:92vh;overflow:auto}
#historyList{max-height:68vh;overflow-y:auto;padding-right:4px}
.logbody{white-space:pre-wrap;color:#d8d8d8;font-family:var(--font-mono);font-size:12px;line-height:1.42;max-height:320px;overflow:auto;background:#020202;border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:10px}
.logbody strong{font-family:var(--font-din);font-weight:700;color:#fff}
.logbody .section{color:#ff0000}
.runtime-view{margin-top:12px;max-height:64vh}
.runtime-raw{position:absolute;left:-9999px;top:auto;width:1px;height:1px;opacity:0;pointer-events:none}
.toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:30;opacity:0;transition:.18s;border:1px solid #444;border-radius:999px;background:#111;color:#fff;padding:11px 16px;font-family:var(--font-din)}
.toast.show{opacity:1}
@media(max-width:700px){.actions{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}}

: S4 showed the largest automatic ROM expansion, likely from inertia and rhythm synchronization rather than forced output\n: cooldown showed slight anterior-shoulder support load during HVR, but band work and passive ROM closed cleanly\n: overall session closed as a clean Complex Push progression marker and sets up BAPL60 5.5 E2 as the next exposure.\n\n⸻"},{"id":"1780234781917074de188f61cc","date":"2026-05-31","result":"Monthly Summary","slot":"Monthly Summary","lineKey":"monthlySummary","category":"Monthly Summary","exercise":"Monthly Summary","progress":"","logText":"NSS-77TR — Monthly Core Summary [2026-05]\n\nMay functioned as a transition-closure / NSD-6 re-entry month, not a simple continuation month. Total logged days reached 31, with 27 completed sessions and 4 Rest / Delay entries. The month included multiple previous-stage graduations, full NSD-6 line replacement, new lower-level technical entries, and the first practical STATUS → RECORD transfer test. The main character of May was therefore not just training continuation, but system conversion: completed 7-level lines became the base for new movement maps.\n\nMay should be defined as\n\nprevious 7-level closure + NSD-6 line transition + new movement mapping + record-system integration.\n\nOverall character of the month\n\nMay began by closing several lines from the previous transition block. Adv. PL PU, HSPU, BAPL45, A. OAP, and Str. FL Row all reached closure or graduation-quality markers. After those closures, the system did not continue by simply adding more volume to the same movements. Instead, it shifted into new entries: PHSPU, Str. PL PU, OAP Negative, FL Row, BAPL60, Str. 360 Pull, and Negative + A. Pistol.\n\nThe important point is that these new entries began at lower levels without behaving like regressions. The earlier 7-level base carried over as support tolerance, rhythm familiarity, lever control, and signal clarity. May therefore acted as a conversion month where old endpoints became new baselines.\n\nCurrent working hypothesis\n\nLower-level re-entry after 7-level closure is not a reset. In the current system, it functions as a mapping phase for longer levers, deeper ROM, new setup constraints, and more specific signal interpretation. Progression quality should be judged by how quickly the new line attaches cleanly, not by whether the visible level number is high.\n\nRest / Delay entries also remained compatible with the rotation. They did not break the system as long as the next actual completed session resumed from the correct line state.\n\nPrimary stage-transition lines\n\nHSPU / PHSPU\n\nHSPU completed 7.7 E2 and can be marked as graduated. The key May change was not a single peak set, but repeated operating stability under non-ideal starting condition. Several sets reproduced 6+ continuity, and one important in-set recovery appeared when a forward-diagonal bent line was held, re-centered, and continued without coming down.\n\nAfter graduation, the vertical push line transitioned into PHSPU. PHSPU immediately changed the problem from free-balance / floor support into deeper ROM and parallette setup management. Wrist load reduced clearly, while entry / exit cost and face-to-hand ROM became the main practical variables.\n\nAdv. PL PU / Str. PL PU\n\nAdv. PL PU completed 7.7 E2 and graduated cleanly. The 7-level horizontal push no longer behaved like a major event. It felt more like an operating checkpoint, with local shoulder load fading into the background and trunk control remaining the main task.\n\nAfter that, the line transitioned into Str. PL PU. The new working shape was not yet a clean full straddle line. It appeared as a compact frog / straddle-L-like intermediate push. The main limiter shifted from pressing output to pelvis, hip, and leg-position mapping.\n\nA. OAP / OAP Negative\n\nA. OAP closed at 7.7 E3. It remained one of the hardest lines, but May showed the clearest improvement in output and stamina since A.OAP became the vertical-pull line. Dead-hang pass-through became more available, sway stayed low, and S1 reached the best output so far.\n\nThe line then moved into OAP Negative. This confirmed that full one-arm negative is not yet available. The current negative work remains support-dependent, with close-hand start, main-arm loading, hook-like grip tendency, forearm demand, and one-arm dead-hang transition becoming the main information points. OAP Negative now functions as a cleaner range / load-mapping phase rather than a volume target.\n\nStr. FL Row / FL Row\n\nStr. FL Row completed 7.7 E2 and closed the previous horizontal-pull transition block. The endpoint was not a polished full straddle row, but stable frog-like working row plus Str reference access. Row identity remained intact even when late-session ROM reduced.\n\nFL Row then entered better than expected. Removing the straddle split reduced pelvis / hip noise, and the working shape became closer to a bent-knee full-lever-like row. The row trajectory was small but alive. This suggests that the row pattern transferred successfully from Str. FL Row into a cleaner full-line preparation.\n\nBAPL45 / BAPL60\n\nBAPL45 completed 7.7 E2 and graduated through pendulum-based continuous rotation. The important carryover was rhythm, not static strength. Lever fixation, toe extension, and rebound rotation became repeatable under 7-level volume.\n\nBAPL60 then entered as the new Complex Push line. The first exposures corrected the assumption that 80–90° BAPL would be almost impossible. BAPL60 worked through rebound-assisted / pendulum-driven rotation rather than static holding. By 5.5 E1, the line attached cleanly: S1 showed mild entry signal, S2 connected the pendulum rhythm, S3 stabilized lever / rotation synchronization, and S4 reached near-90° rotation through inertia rather than forced output.\n\nAdv. 360 Pull / Str. 360 Pull\n\nAdv. 360 Pull had already graduated at the end of April, and May converted that rhythm base into Str. 360 Pull. The new line immediately exposed setup limits: doorway space, back-lever-side foot contact, limited straddle width, and near-full-like lever moments.\n\nStr. 360 Pull progressed through 3.3, 3.5, and 5.5 exposure. The movement became more familiar, but forearm accumulation and back-side pelvis opening remained the main costs. The next task is smoother pass-through rhythm and cleaner back-lever-side pelvis extension, not static hold polishing.\n\nConditioning / Lower-chain line\n\nThe lower-chain line shifted from Pistol Negative volume toward assisted-ascent mapping. Pistol Negative progressed through 6-level and 7-level exposure, but May clarified that more negative volume was no longer the highest-value target. R side remained landing-control dominant, while L side showed clearer bottom-hold access and early ascent-initiation signal.\n\nNegative + A. Pistol entered after this. Ring-assisted ascent was rejected because it changed the ascent trajectory. Floor-hand-assisted ascent became the current transition method. L side connected better through bottom hold into light hand assist, while R side still needs mapping around hand position, forward body curl, foot pressure, and assisted-ascent path.\n\nBurpee 40×3 stayed in the conditioning slot, but its role became more diagnostic. Palm / wrist support-contact warning appeared earlier in the month, then disappeared after pistol arms-forward adjustment. Later sessions showed R shoulder pop during jump-back transition, with farther-forward hand placement reducing the pop. Conditioning therefore continued as both circulation work and support-contact signal inspection.\n\nSignal / fatigue status\n\nMay showed good structural tolerance despite repeated line transitions. Shoulder signals appeared frequently, but most were residual, rhythm-related, setup-related, or post-set traces rather than stop-level warnings. R shoulder residual remained the most common repeated trace, especially around band work, support lines, BAPL rotation, and burpee transitions.\n\nPalm / wrist support-contact warning appeared but did not become a persistent limiter. PHSPU reduced wrist burden through parallettes, while OAP Negative and Str. 360 Pull shifted load toward forearm, grip, and hook-control demand.\n\nLower-chain signals stayed mostly non-painful. Knee pops appeared around pistol bottom work, but the more important limiter was bottom-hold control, ankle / foot-pressure mapping, and assisted-ascent path. DOMS or ordinary local fatigue did not define the month. Movement quality and signal interpretation mattered more than soreness.\n\nSystem interpretation\n\nMay confirmed that NSD-6 is now functioning as a rotation of transition lines rather than a list of isolated exercises. Earlier main movements are becoming warm-up exposures, signal checks, or base conditions for the next line.\n\nHSPU became the base for PHSPU. Adv. PL PU became the base for Str. PL PU. A. OAP became the base for OAP Negative. Str. FL Row became the base for FL Row. BAPL45 became the base for BAPL60. Adv. 360 Pull became the base for Str. 360 Pull. Pistol Negative became the base for Negative + A. Pistol.\n\nThis is the clearest system-level change in May. The month did not simply add more difficulty. It reorganized completed lines into a new operating map.\n\nMonthly conclusion\n\nMay was a transition-closure and NSD-6 re-entry month. The month closed several 7-level lines, then converted them into new lower-level technical entries. These lower-level entries did not behave like regressions. They carried over the previous block’s support tolerance, rhythm base, lever awareness, and signal clarity.\n\nOverall, May should be marked as\n\nthe month where the previous 7-level transition block closed, NSD-6 became the active operating structure, and new movement lines began mapping from a stronger base rather than from zero.\n\nThe next phase should not rush level escalation. The main task is to preserve clean mapping, rhythm attachment, and signal stability while each new line builds its own usable operating pattern."},{"id":"178031783880548ea9cb54c4268","date":"2026-06-01","result":"Completed","slot":"Conditioning","lineKey":"conditioning","category":"Conditioning","exercise":"Negative + A. Pistol","progress":"3.5 (3×5) [E2]","logText":"6/1 Mon — Conditioning\n\nSession time: ~1h 05m\n\nWU\nFR full body\nHSPU ×3\n: attached well\n: completed 3 continuous reps in one entry\n: ROM felt close to standard range\nWall Extension 10×2\n: normal\nBand Dislocate 10×2\n: shoulder residual was weaker than expected\nStatic Position\n: Adv. BL 6s / Adv. L-sit 6s\n: no notable issue\nL Pull-up 5×1\n: close to explosive pulling\nWU Notes\n: warm-up finished in ~12m\n: despite shoulder residual appearing during the day, warm-up state was one of the fastest and smoothest in recent sessions\n: mental state was calm rather than up-tempo\n: shoulder residual did not appear as a limiting signal during warm-up\n\nMN\nNegative + A. Pistol 3.5 (3x5) [E2]\nS1\n: overall more stable than the previous exposure\n: R side could not hold the bottom position\n: R descended slowly into glute contact\n: R ascent required strong L-hand floor assist\n: L side achieved 2 bottom holds\n: L ascent used slight R-hand support\n: final L rep ended with slight glute contact\nS2\n: L side achieved the first full ascent for the first time\n: L full ascent was repeated twice in a row\n: ascent required strong arm-swing / counterbalance action, with both arms rotating like paddles\n: R side remained similar to S1\nS3\n: R side remained similar\n: L first rep achieved full ascent again\n: this time L ascent was performed while maintaining arms-forward position\n: remaining 2 L reps were intentionally recovered with slight support\nS4\n: L full ascent continued\n: arms-forward position was maintained\n: L ascent showed a sticking point around the 30–40% ascent range, where output briefly lagged before completing the rise\n: L full as <script>
const DEFAULT = JSON.parse(document.getElementById("seedData").textContent);

function clone(o){return JSON.parse(JSON.stringify(o))}
function deepMerge(base, incoming){const out=clone(base); if(!incoming||typeof incoming!=="object") return out; Object.keys(incoming).forEach(k=>{if(incoming[k]&&typeof incoming[k]==="object"&&!Array.isArray(incoming[k])&&out[k]&&typeof out[k]==="object"&&!Array.isArray(out[k])) out[k]=deepMerge(out[k],incoming[k]); else out[k]=incoming[k];}); return out;}

function titleDate(d){const x=new Date(d+"T00:00:00");return `${x.getMonth()+1}/${x.getDate()} ${week(d)}`;}
function nextMeta(){const idx=((state.rotationIndex%state.rotation.length)+state.rotation.length)%state.rotation.length; const r=state.rotation[idx]; return {...r,...(state.lines[r.lineKey]||{}),rotIndex:idx};}
function logTime(l){return (l.date||"") + "T00:00:00"}
function sortedLogs(){return [...state.logs].sort((a,b)=>logTime(a).localeCompare(logTime(b)) || String(a.id||"").localeCompare(String(b.id||"")))}

function knownExerciseFromMain(main, lineKey){

function extractProgressFromMain(main,ex){
  const s=String(main||"");
  const escaped=String(ex||"").replace(/[.*+?^${}()|[\]\\]/g,"\\$&");

  // OAP bilateral / assisted notation:
  // OAP Negative 3.5 (R3 / L3) ×3 [E2]
  const oap=s.match(new RegExp(escaped+"\\s+(\\d+\\.\\d+)\\s*\\(R\\d+\\s*\\/\\s*L\\d+\\)\\s*[×x]\\s*\\d+\\s*\\[(E\\d+)\\]","i"));

    const parts=oap[1].split(".");
    return `${oap[1]} (${parts[0]}×${parts[1]}) [${oap[2]}]`;

  // Movement 3.5 (3×5) [E2]

  const generic=s.match(/(\d+\.\d+)\s*\((?:\d+[×x]\d+|R\d+\s*\/\s*L\d+\)\s*[×x]\s*\d+)\s*\[(E\d+)\]/i);

    const parts=generic[1].split(".");
    return `${generic[1]} (${parts[0]}×${parts[1]}) [${generic[2]}]`;

  return "";
}

function displaySlot(meta){

function displayCategory(meta){return (meta.category||"").toUpperCase();}
function parseProgressString(s){

}

  return m ? m[1] : "E";
}
function next77Progress(progress){

  const map={
    "3.3:E1":"3.5 (3×5) [E2]",
    "3.5:E2":"5.5 (5×5) [E1]",
    "5.5:E1":"5.5 (5×5) [E2]",
    "5.5:E2":"6.6 (6×6) [E1]",
    "6.6:E1":"6.6 (6×6) [E2]",

    "7.7:E1":"7.7 (7×7) [E2]"

  return map[`${p.level}.${p.sets}:${p.exposure}`] || progress;
}
function normalizeDisplayItem(item){
  if(!item) return null;
  const out={...item};

  if(ex){
    out.exercise=ex;

  return out;
}
function latestCompletedByLine(){
  const latest={};
  for(const l of workoutLogs()){

}
function advancePlanItem(item){
  const base=normalizeDisplayItem(item);

  if(out.lineKey==="conditioning"){

  out.mainTemplate=`${out.exercise} ${out.progress}
:`;

    out.mainTemplate=`${out.exercise} ${out.progress}
:

Burpee 40x3
:`;

function seedPlanFromLine(lineKey){
  const l=state.lines[lineKey] || {};
  return normalizeDisplayItem({
    lineKey,
    slot:(state.rotation.find(r=>r.lineKey===lineKey)?.slot||""),
    category:l.category||"",
    exercise:l.exercise||"",
    progress:l.progress||"",
    exposure:l.exposure||exposureFromProgress(l.progress||""),
    logText:""
  });
}
function projectedWheelFrom(startIndex){
  const cursor=latestCompletedByLine();
  const wheel=[];
  for(let i=0;i<state.rotation.length;i++){
    const slotIndex=(startIndex+i)%state.rotation.length;
    const rot=state.rotation[slotIndex];
    const lineKey=rot.lineKey;
    const prev=cursor[lineKey] || null;
    const next=prev ? advancePlanItem(prev) : seedPlanFromLine(lineKey);
    if(next){
      next.slot=rot.slot;
      next.category=state.lines[lineKey]?.category || next.category || "";
      next.lineKey=lineKey;
      next.slotIndex=slotIndex;
      next.wheelPosition=i+1;
      next.exposure=exposureFromProgress(next.progress);
    }
    wheel.push({rot,lineKey,prev,next,slotIndex,wheelPosition:i+1});

}
function projectedWheel(){return projectedWheelFrom(state.rotationIndex||0);}
function wheelEntryForSlot(slotIndex){

  return projectedWheel().find(e=>e.slotIndex===slotIndex) || projectedWheel()[0];
}
function currentWheelEntry(){
  const idx=Number.isInteger(state.rotationIndex) ? state.rotationIndex : 0;
  return wheelEntryForSlot(idx);
}


function nextMeta(){
  const entry=currentWheelEntry();

}

}

function lastSaved(){return [...sortedLogs()].reverse().find(l=>l.result !== "Rest / Delay") || sortedLogs().at(-1) || null;}

function formatOapProgress(progress){

  const m=s.match(/(\d+)\.(\d+).*?\[(E\d+)\]/);
  if(!m) return s;
  const rep=parseInt(m[1],10);
  const setCount=parseInt(m[2],10);
  const exposure=m[3];
  const rounds=Math.ceil(setCount/2);
  return `${m[1]}.${m[2]} (R${rep} / L${rep}) ×${rounds} [${exposure}]`;
}
function formatOapInternalProgress(progress){
  const s=String(progress||"");
  let m=s.match(/(\d+)\.(\d+)\s*\(R\d+\s*\/\s*L\d+\)\s*[×x]\s*\d+\s*\[(E\d+)\]/i);
  if(m) return `${m[1]}.${m[2]} (${m[1]}×${m[2]}) [${m[3]}]`;
  m=s.match(/(\d+)\.(\d+).*?\[(E\d+)\]/);
  if(m) return `${m[1]}.${m[2]} (${m[1]}×${m[2]}) [${m[3]}]`;
  return "";
}

function displayProgress(meta){
  if(isOapLine(meta)) return formatOapProgress(meta.progress);

}
function displayMainTemplate(meta){

:`;

: ${staticPositionFor(meta.lineKey)}

    "Adv. PL PU":"APLPU",

⸻`;

  const prev=previousLogForPrompt(meta);
  const prompt=finalDividerPrompt(prev ? prev.logText : `[No previous ${formatMovement(meta)} log saved yet.]`, buildPlan(meta));
  document.getElementById("runtimePrompt").value=prompt;
  const view=document.getElementById("runtimePromptView");
  if(view) view.innerHTML=formatLogHtml(prompt);
  const pv=document.getElementById("ovPreview"); if(pv) pv.textContent=prompt.split("\n").slice(0,5).join("\n");
  openPanel("planPanel");
  toast("Generate button works · prompt ready");
}
async function copyPrompt(){
  let t=document.getElementById("runtimePrompt").value;
  if(!t.trim()){
    const meta=nextMeta();
    const prev=previousLogForPrompt(meta);
    t=finalDividerPrompt(prev ? prev.logText : `[No previous ${formatMovement(meta)} log saved yet.]`, buildPlan(meta));
    document.getElementById("runtimePrompt").value=t;
  }
  const view=document.getElementById("runtimePromptView");
  if(view) view.innerHTML=formatLogHtml(t);
  await navigator.clipboard.writeText(t);
  toast("Prompt copied");
}
function saveFinalLog(){
  const meta=nextMeta();
  const txt=document.getElementById("finalLog").value.trim();
  const result=document.getElementById("result").value;
  if(!txt && result!=="Rest / Delay"){toast("Paste final log first"); return;}
  const date=document.getElementById("logDate").value || todayISO();
  const isMonthly=result==="Monthly Summary";
  state.logs.push({
    id:String(Date.now())+Math.random().toString(16).slice(2),
    date,
    result,
    slot:isMonthly ? "Monthly Summary" : meta.slot,
    lineKey:isMonthly ? "monthlySummary" : meta.lineKey,
    category:isMonthly ? "Monthly Summary" : meta.category,
    exercise:isMonthly ? "Monthly Summary" : meta.exercise,
    progress:isMonthly ? "" : meta.progress,
    logText:txt || `${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${formatMovement(meta)} delayed.`
  });
  if(result==="Completed"){
    state.rotationIndex=(state.rotationIndex+1)%state.rotation.length;
  }
  state.selectedSlotIndex=state.rotationIndex;
  document.getElementById("finalLog").value="";
  persist();
  render();
  closePanels();
  toast(isMonthly ? "Monthly summary saved" : "Session saved");
}
function advanceRotation(){
  const base=Number.isInteger(state.selectedSlotIndex) ? state.selectedSlotIndex : state.rotationIndex;
  state.selectedSlotIndex=(base+1)%state.rotation.length;
  persist();
  render();
  toast("Rotation preview advanced");
}
function markRest(){
  const meta=nextMeta();
  const date=todayISO();
  state.logs.push({
    id:String(Date.now())+Math.random().toString(16).slice(2),
    date,
    result:"Rest / Delay",
    slot:meta.slot,
    lineKey:meta.lineKey,
    category:meta.category,
    exercise:meta.exercise,
    progress:meta.progress,
    logText:`${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${formatMovement(meta)} delayed.`
  });
  state.selectedSlotIndex=state.rotationIndex;
  persist();
  render();
  toast("Rest / Delay saved");
}
function openPanel(id){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active")); document.getElementById(id).classList.add("active");}
function closePanels(){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));}
function fillFilters(){const f=document.getElementById("filter"); if(!f) return; const old=f.value||"all"; f.innerHTML='<option value="all">All</option>'+Object.entries(state.lines).map(([k,v])=>`<option value="${k}">${v.category} — ${v.exercise}</option>`).join(""); f.value=old;}
function formatLogHtml(raw){
  const nl=String.fromCharCode(10);
  const lines=String(raw||"").split(nl);
  let inMN=false;
  let pendingMainTitle=false;
  return lines.map((line,idx)=>{
    const safe=esc(line);
    const trimmed=line.trim();
    if(idx===0 && /^\d+\/\d+/.test(trimmed)) return `<strong>${safe}</strong>`;
    if(["WU","MN","CD","Notes"].includes(trimmed)){
      inMN=trimmed==="MN";
      pendingMainTitle=inMN;
      return `<strong class="section">${safe}</strong>`;
    }
    if(/^(WU Notes|MN Notes|MN Summary|Passive ROM 6)/.test(trimmed)) return `<strong>${safe}</strong>`;
    if(inMN && trimmed && !trimmed.startsWith(":") && !/^S\d+/.test(trimmed) && pendingMainTitle){
      pendingMainTitle=false;
      return `<strong>${safe}</strong>`;
    }
    if(inMN && trimmed && /^(Burpee|Negative \+ A\. Pistol|Pistol Negative|Str\. 360 Pull|BAPL|PHSPU|HSPU|FL Row|Str\. FL Row|OAP|A\. OAP|Adv\. PL PU|Str\. PL PU)/.test(trimmed) && !trimmed.startsWith(":")){
      return `<strong>${safe}</strong>`;
    }
    return safe;
  }).join(nl);
}
function renderHistory(){
  const list=document.getElementById("historyList");
  if(!list) return;
  const f=document.getElementById("filter")?.value||"all";
  const q=(document.getElementById("search")?.value||"").toLowerCase();
  const logs=[...sortedLogs()].reverse().filter(l=>(f==="all"||l.lineKey===f)&&JSON.stringify(l).toLowerCase().includes(q));
  list.innerHTML = logs.length ? "" : '<div class="logitem">No logs yet.</div>';
  logs.slice(0,120).forEach(l=>{
    const div=document.createElement("div");
    div.className="logitem";
    div.innerHTML=`<h3>${esc(l.date)} · ${esc(l.exercise)} · ${esc(l.result)}</h3><div class="muted">${esc(l.category||"")} · ${esc(l.progress||"")}</div><div class="logbody">${formatLogHtml(l.logText)}</div><div class="actions"><button onclick="copyLog('${l.id}')">COPY</button><button onclick="deleteLog('${l.id}')">DELETE</button><button onclick="reuseLog('${l.id}')">USE AS PREV</button></div>`;
    list.appendChild(div);
  });
}
async function copyLog(id){const l=state.logs.find(x=>x.id===id); if(!l) return; await navigator.clipboard.writeText(l.logText); toast("Log copied");}
function reuseLog(id){
  const l=state.logs.find(x=>x.id===id);
  if(!l) return;
  const t=`${l.logText}

⸻

${buildPlan(nextMeta())}

⸻`;
  document.getElementById("runtimePrompt").value=t;
  const view=document.getElementById("runtimePromptView");
  if(view) view.innerHTML=formatLogHtml(t);
  openPanel("planPanel");
  toast("Loaded");
}
function deleteLog(id){if(!confirm("Delete this log?")) return; state.logs=state.logs.filter(x=>x.id!==id); persist(); render(); toast("Deleted");}
function fillSettings(){
  const rotationIndex=document.getElementById("rotationIndex");
  const rotationJson=document.getElementById("rotationJson");
  const linesJson=document.getElementById("linesJson");
  if(rotationIndex) rotationIndex.value=state.rotationIndex;
  if(rotationJson) rotationJson.value=JSON.stringify(state.rotation,null,2);
  if(linesJson) linesJson.value=JSON.stringify(state.lines,null,2);
}
function saveRotation(){try{state.rotationIndex=Number(document.getElementById("rotationIndex").value)||0; state.rotation=JSON.parse(document.getElementById("rotationJson").value); persist(); render(); toast("Rotation saved");}catch(e){toast("Invalid JSON")}}
function saveLines(){try{state.lines=JSON.parse(document.getElementById("linesJson").value); persist(); render(); toast("Lines saved");}catch(e){toast("Invalid JSON")}}
function fillRecordMonths(){
  const sel=document.getElementById("recordMonth");
  if(!sel) return;
  const old=sel.value;
  const months=[...new Set(sortedLogs().map(l=>(l.date||"").slice(0,7)).filter(Boolean))].sort().reverse();
  const fallback=todayISO().slice(0,7);
  const opts=months.length ? months : [fallback];
  sel.innerHTML=opts.map(m=>`<option value="${m}">${m}</option>`).join("");
  sel.value=opts.includes(old) ? old : opts[0];
}
function stripOuterDividers(s){
  return String(s||"")
    .replace(/^\s*(?:⸻\s*)+/g,"")
    .replace(/\s*(?:⸻\s*)+$/g,"")
    .trim();
}
function normalizeMonthlySummaryText(raw,ym){
  let s=stripOuterDividers(raw)
    .replace(/^NSS-77TR RECORD\s*/i,"")
    .trim();
  if(!s) return `NSS-77TR — Monthly Core Summary [${ym}]\n\n`;
  if(!/Monthly Core Summary/i.test(s)){
    s=`NSS-77TR — Monthly Core Summary [${ym}]\n\n${s}`;
  }
  return s.trim();
}

function normalizeDailyTitleDashForRecord(s){
  return String(s||"").replace(/^(\d{1,2}\/\d{1,2}\s+[A-Za-z]{3})\s+-\s+/gm,"$1 — ");
}

function buildRecordMonth(ym){
  const logs=sortedLogs().filter(l=>(l.date||"").startsWith(ym));
  const summaries=logs.filter(l=>l.result==="Monthly Summary");
  const daily=logs
    .filter(l=>l.result!=="Monthly Summary")
    .sort((a,b)=>{
      const d=(b.date||"").localeCompare(a.date||"");
      if(d!==0) return d;
      return String(b.id||"").localeCompare(String(a.id||""));
    });

  const summaryText=summaries.length
    ? summaries.map(l=>normalizeMonthlySummaryText(l.logText,ym)).filter(Boolean).join("\n\n")
    : "";

  const dailyText=daily.map(l=>normalizeDailyTitleDashForRecord(stripOuterDividers(l.logText))).filter(Boolean).join("\n\n⸻\n\n");

  const parts=["NSS-77TR RECORD"];
  if(summaryText){
    parts.push("⸻", summaryText);
  }
  if(dailyText){
    parts.push("⸻", dailyText);
  }
  parts.push("⸻");

  return parts.join("\n\n");
}
async function copyRecordMonth(){
  const ym=document.getElementById("recordMonth")?.value || todayISO().slice(0,7);
  const text=buildRecordMonth(ym);
  await navigator.clipboard.writeText(text);
  toast(`Record copied · ${ym}`);
}

function exportData(){const blob=new Blob([JSON.stringify(state,null,2)], {type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`nsd6_backup_${todayISO()}.json`; a.click(); URL.revokeObjectURL(a.href);}
function importData(e){const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{try{state=applyDefaults(JSON.parse(r.result)); persist(); render(); toast("Imported");}catch(err){toast("Import failed")}}; r.readAsText(file);}
function resetAll(){if(!confirm("Reset app data? Export backup first.")) return; state=clone(DEFAULT); persist(); render(); toast("Reset");}
function esc(s){return String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":">",'"':"&quot;","'":"&#039;"}[c]));}

const SYNC_API_URL="https://nsd-6-sync-api.vercel.app/api/sync";
const SYNC_KEY_STORAGE="nsd6_sync_key";
function initStatusSyncKey(){
  const el=document.getElementById("statusSyncKey");
  if(el) el.value=localStorage.getItem(SYNC_KEY_STORAGE)||"";
}
function saveStatusSyncKey(){
  const el=document.getElementById("statusSyncKey");
  if(!el) return;
  const value=el.value.trim();
  if(value) localStorage.setItem(SYNC_KEY_STORAGE, value);
  else localStorage.removeItem(SYNC_KEY_STORAGE);
}
function getStatusSyncKey(){
  const el=document.getElementById("statusSyncKey");
  if(el) return el.value.trim();
  return localStorage.getItem(SYNC_KEY_STORAGE) || "";
}

const SYNC_AUTO_STORAGE="nsd6_auto_sync";
let statusAuthLoadTimer=null;
let statusSyncHydrating=false;
let statusAutoSaveTimer=null;
function isStatusAutoSyncOn(){return !!getStatusSyncKey();}
function setStatusAutoSyncUI(ok=false){
  const on=!!ok;
  const el=document.getElementById("statusAutoSyncText");
  if(el) el.classList.toggle("ok", on);
  const img=document.getElementById("statusDashSyncIndicator");
  if(img) img.src=on ? "SYNC_INDICATOR_GREEN.png" : "SYNC_INDICATOR_RED.png";
}
function scheduleStatusAuthCheck(){
  clearTimeout(statusAuthLoadTimer);
  const key=getStatusSyncKey();
  if(!key){ setStatusAutoSyncUI(false); return; }
  statusAuthLoadTimer=setTimeout(()=>checkStatusAuth(true), 700);
}
async function checkStatusAuth(silent=false){
  const key=getStatusSyncKey();
  if(!key){ setStatusAutoSyncUI(false); return false; }
  try{
    const res=await fetch(SYNC_API_URL+"?auth=1&target=status",{method:"GET",headers:{"X-Sync-Key":key}});
    const json=await res.json();
    if(!res.ok || !json.ok || json.access!=="auth-ok") throw new Error(json.error||("Auth check failed"));
    setStatusAutoSyncUI(true);
    return true;
  }catch(err){
    console.error(err);
    setStatusAutoSyncUI(false);
    if(!silent) toast("Auth failed");
    return false;
  }
}



function scheduleStatusAutoSave(){
  if(statusSyncHydrating || !isStatusAutoSyncOn()) return;
  const key=getStatusSyncKey();
  if(!key) return;
  clearTimeout(statusAutoSaveTimer);
  statusAutoSaveTimer=setTimeout(()=>saveStatusCloud(true), 900);
}

async function loadStatusCloud(silent=false){
  try{
    if(!silent) toast("Loading...");
    const res=await fetch(SYNC_API_URL+"?target=status",{method:"GET"});
    const json=await res.json();
    if(!res.ok || !json.ok) throw new Error(json.error||("HTTP "+res.status));
    statusSyncHydrating=true;
    state=applyDefaults(json.data);
      persist();
    statusSyncHydrating=false;
    render();
    initStatusSyncKey();
    toast(silent ? "Auto loaded" : "Loaded");
  }catch(err){
    console.error(err);
    setStatusAutoSyncUI(false); toast("Load failed · "+String(err.message||err).slice(0,42));
  }
}
async function saveStatusCloud(silent=false){
  const key=getStatusSyncKey();
  if(!key){toast("SYNC KEY missing");return;}
  try{
    if(!silent) toast("Saving...");
    const res=await fetch(SYNC_API_URL+"?target=status",{method:"POST",headers:{"Content-Type":"application/json","X-Sync-Key":key},body:JSON.stringify({target:"status",data:state})});
    const json=await res.json();
    if(!res.ok || !json.ok) throw new Error(json.error||("HTTP "+res.status));
    setStatusAutoSyncUI(true); setStatusAutoSyncUI(true); toast(silent ? "Auto synced" : "Saved cloud");
  }catch(err){
    console.error(err);
    setStatusAutoSyncUI(false); toast("Save failed · "+String(err.message||err).slice(0,42));
  }
}

function toast(msg){const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 1400);}
if("serviceWorker" in navigator){window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
initState().then(async()=>{ applyOneTimeLogFixes(); updateScale(); render(); initStatusSyncKey(); setStatusAutoSyncUI(false); await loadStatusCloud(true); if(getStatusSyncKey()) await checkStatusAuth(true); });
