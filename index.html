<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>NSD-6 STATUS CONTROL v0.4</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">NSD-6 STATUS CONTROL</p>
        <h1>Control Panel <span>v0.4</span></h1>
      </div>
      <button id="exportBtn" class="ghost-btn" type="button">Export</button>
    </header>

    <main>
      <section class="hero-card">
        <div class="hero-grid">
          <div>
            <p class="label">Current Slot</p>
            <h2 id="currentSlotTitle">-</h2>
            <p id="currentSlotMeta" class="meta">-</p>
          </div>
          <div class="status-pill" id="slotPill">READY</div>
        </div>
        <div class="progress-line">
          <div id="progressFill"></div>
        </div>
        <div class="hero-actions">
          <button id="prevSlotBtn" type="button">Prev</button>
          <button id="nextSlotBtn" type="button">Next</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>8-Slot Rotation</h3>
          <span id="rotationCounter">1 / 8</span>
        </div>
        <div id="rotationGrid" class="rotation-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Movement Stack</h3>
          <span id="movementMode">v0.4</span>
        </div>
        <div id="movementList" class="movement-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Previous Session Log</h3>
          <span>local</span>
        </div>
        <textarea id="previousLog" placeholder="이전 같은 라인 로그 또는 참고 로그를 붙여넣기"></textarea>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Today Plan</h3>
          <span>prompt source</span>
        </div>
        <textarea id="todayPlan" placeholder="오늘 세션 계획 / 수정 포인트 입력"></textarea>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Prompt Generator</h3>
          <span>Kai runtime</span>
        </div>
        <button id="generatePromptBtn" class="wide-btn" type="button">Generate Previous Session Log + Today Plan</button>
        <textarea id="promptOutput" readonly placeholder="생성된 프롬프트가 여기에 표시됨"></textarea>
        <button id="copyPromptBtn" class="wide-btn secondary" type="button">Copy Prompt</button>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Save Final Log</h3>
          <span>history</span>
        </div>
        <textarea id="finalLog" placeholder="Kai가 정리한 최종 로그를 붙여넣기"></textarea>
        <button id="saveLogBtn" class="wide-btn" type="button">Save Session</button>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>History</h3>
          <span id="historyCount">0 logs</span>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Backup / Restore</h3>
          <span>JSON</span>
        </div>
        <div class="backup-row">
          <label class="file-label">
            Import JSON
            <input id="importFile" type="file" accept="application/json" />
          </label>
          <button id="clearBtn" class="danger-btn" type="button">Clear Local Data</button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-jump="rotationGrid" type="button">Map</button>
      <button data-jump="previousLog" type="button">Prompt</button>
      <button data-jump="finalLog" type="button">Save Log</button>
      <button data-jump="historyList" type="button">History</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
