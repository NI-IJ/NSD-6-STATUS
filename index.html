<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.webmanifest" />
<title>NSD-6 Control Panel</title>
<style>
:root{
  --w: 941;
  --h: 1672;
  --green: rgb(20,255,70);
  --red: #ff1218;
  --text: #f2f2f2;
  --muted: #aaaab0;
  --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#000;
  color:var(--text);
  font-family:var(--sans);
}
body{
  padding:0;
  overflow-x:hidden;
}
button,input,select,textarea{font:inherit}
button{
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.app-wrap{
  width:min(100vw, 941px);
  margin:0 auto;
  position:relative;
}
.skin{
  width:100%;
  height:auto;
  display:block;
  user-select:none;
  pointer-events:none;
}
.layer{
  position:absolute;
  inset:0;
  z-index:2;
}
.hotspot{
  position:absolute;
  border:0;
  background:transparent;
  color:transparent;
  padding:0;
}
.hotspot:active{
  background:rgba(255,255,255,.035);
  border-radius:999px;
}
.txt{
  position:absolute;
  font-family:var(--font);
  color:var(--text);
  line-height:1.15;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
}
.txt-green{color:var(--green)}
.txt-red{color:var(--red)}
.txt-muted{color:var(--muted)}
.small{font-size:1.65vw}
.medium{font-size:2.15vw}
.large{font-size:3.25vw}
.xlarge{font-size:4.25vw}
.bold{font-weight:800}
.center{text-align:center}
.preview-text{
  position:absolute;
  font-family:var(--font);
  color:#e7e7e7;
  line-height:1.36;
  white-space:pre-wrap;
  overflow:hidden;
  pointer-events:none;
  font-size:1.85vw;
}
.edit-panel{
  display:none;
  position:fixed;
  inset:0;
  z-index:10;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(12px);
  padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));
  overflow:auto;
}
.edit-panel.active{display:block}
.panel-card{
  width:min(920px,100%);
  margin:0 auto 16px;
  border:1px solid #33343a;
  border-radius:18px;
  background:linear-gradient(180deg,#0b0b0d,#030303);
  padding:16px;
  box-shadow:0 0 30px rgba(255,0,0,.12);
}
.panel-title{
  font-family:var(--font);
  color:var(--red);
  letter-spacing:.08em;
  font-size:18px;
  margin:0 0 14px;
}
label{
  display:block;
  font-family:var(--font);
  color:var(--muted);
  margin:12px 0 7px;
  font-size:13px;
}
textarea,input,select{
  width:100%;
  border:1px solid #33343a;
  background:#030303;
  color:#fff;
  border-radius:10px;
  padding:12px;
  outline:none;
  font-family:var(--font);
  font-size:14px;
}
textarea{
  min-height:220px;
  resize:vertical;
  line-height:1.45;
}
.panel-actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}
.panel-actions button, .panel-button{
  border:1px solid #33343a;
  background:#050505;
  color:#fff;
  border-radius:10px;
  min-height:48px;
  font-family:var(--font);
  font-weight:800;
}
.panel-actions .red, .panel-button.red{
  background:linear-gradient(180deg,#f00909,#9f0000);
  border-color:#ff1f1f;
}
.formgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.list{display:grid;gap:10px}
.logitem{
  border:1px solid #33343a;
  border-radius:12px;
  background:#060606;
  padding:12px;
}
.logitem h3{
  margin:0 0 8px;
  font-family:var(--font);
  font-size:14px;
}
.logitem pre{
  margin:0;
  white-space:pre-wrap;
  color:#d8d8d8;
  max-height:170px;
  overflow:auto;
  font-family:var(--font);
  font-size:12px;
  line-height:1.42;
}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(22px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  background:#111;
  border:1px solid #444;
  color:#fff;
  padding:11px 16px;
  border-radius:999px;
  opacity:0;
  transition:.18s;
  z-index:20;
  font-family:var(--font);
}
.toast.show{opacity:1}

@media(min-width:942px){
  .small{font-size:15.5px}
  .medium{font-size:20px}
  .large{font-size:30px}
  .xlarge{font-size:40px}
  .preview-text{font-size:17px}
}
@media(max-width:700px){
  .panel-actions{grid-template-columns:1fr}
  .formgrid{grid-template-columns:1fr}
}

/* Overlay positions are percentage-based from BASE.png 941x1672 */
#ovExposure{left:9.2%;top:22.0%;width:7.0%}
#ovSlot{left:18.6%;top:21.2%;width:20%}
#ovCategory{left:18.5%;top:24.6%;width:34%}
#ovReady{left:20.4%;top:29.2%;width:12%}
#ovMovement{left:25.7%;top:36.1%;width:42%}
#ovRotation{left:25.7%;top:39.6%;width:28%}
#ovPrevious{left:25.7%;top:43.3%;width:42%}
#ovProgression{left:25.7%;top:46.9%;width:42%}
#ovExposureRow{left:25.7%;top:50.6%;width:42%}
#ovLastSaved{left:25.7%;top:54.2%;width:42%}

#ovSessions{left:16.9%;top:72.5%;width:9%;text-align:left}
#ovRests{left:42.1%;top:72.5%;width:9%;text-align:left}
#ovStreak{left:67.5%;top:72.5%;width:9%;text-align:left}
#ovMonth{left:79.8%;top:68.0%;width:11%;text-align:right}
#ovBlock{left:30.6%;top:78.3%;width:42%}
#ovUptime{left:78.8%;top:78.3%;width:12%;text-align:right}

#ovPreview{left:8.1%;top:85.2%;width:83.7%;height:5.7%}

/* Hotspots */
#hsDashboard{left:3.2%;top:8.9%;width:20.5%;height:4.0%}
#hsPlan{left:24.4%;top:8.9%;width:15.0%;height:4.0%}
#hsSave{left:40.6%;top:8.9%;width:19.4%;height:4.0%}
#hsHistory{left:61.7%;top:8.9%;width:15.7%;height:4.0%}
#hsSettings{left:78.7%;top:8.9%;width:18.0%;height:4.0%}
#hsGenerateMain{left:5.6%;top:50.0%;width:87.4%;height:5.4%}
#hsAdvance{left:5.6%;top:56.8%;width:43.0%;height:5.7%}
#hsRest{left:50.4%;top:56.8%;width:43.0%;height:5.7%}
#hsEditTemplate{left:71.0%;top:82.2%;width:21.8%;height:2.7%}
#hsGenerateBottom{left:5.6%;top:92.5%;width:28.0%;height:4.5%}
#hsCopy{left:35.0%;top:92.5%;width:27.0%;height:4.5%}
#hsSaveBottom{left:63.2%;top:92.5%;width:30.0%;height:4.5%}
</style>
</head>
<body>
<div class="app-wrap" id="appWrap">
  <img src="BASE.png" class="skin" alt="NSD-6 Control Panel Skin" />
  <div class="layer">
    <!-- Dynamic overlay -->
    <div id="ovExposure" class="txt xlarge txt-red bold center">E1</div>
    <div id="ovSlot" class="txt medium txt-muted">PULL</div>
    <div id="ovCategory" class="txt large bold">HORIZONTAL PULL</div>
    <div id="ovReady" class="txt medium txt-green">● READY</div>

    <div id="ovMovement" class="txt medium">-</div>
    <div id="ovRotation" class="txt medium">-</div>
    <div id="ovPrevious" class="txt medium">-</div>
    <div id="ovProgression" class="txt medium">-</div>
    <div id="ovExposureRow" class="txt medium">-</div>
    <div id="ovLastSaved" class="txt medium">-</div>

    <div id="ovMonth" class="txt medium txt-muted">MAY 2026</div>
    <div id="ovSessions" class="txt xlarge bold">0</div>
    <div id="ovRests" class="txt xlarge bold">0</div>
    <div id="ovStreak" class="txt xlarge bold">0</div>
    <div id="ovBlock" class="txt medium txt-green">NSD-6 ROTATION ACTIVE</div>
    <div id="ovUptime" class="txt small txt-muted">0d 00h</div>

    <div id="ovPreview" class="preview-text">Generate a runtime prompt first.</div>

    <!-- Transparent interaction layer -->
    <button id="hsDashboard" class="hotspot" onclick="closePanels()">Dashboard</button>
    <button id="hsPlan" class="hotspot" onclick="openPanel('planPanel')">Plan</button>
    <button id="hsSave" class="hotspot" onclick="openPanel('savePanel')">Save Log</button>
    <button id="hsHistory" class="hotspot" onclick="openPanel('historyPanel')">History</button>
    <button id="hsSettings" class="hotspot" onclick="openPanel('settingsPanel')">Settings</button>
    <button id="hsGenerateMain" class="hotspot" onclick="generatePrompt()">Generate</button>
    <button id="hsAdvance" class="hotspot" onclick="advanceRotation()">Advance</button>
    <button id="hsRest" class="hotspot" onclick="markRest()">Rest</button>
    <button id="hsEditTemplate" class="hotspot" onclick="openPanel('settingsPanel')">Edit Template</button>
    <button id="hsGenerateBottom" class="hotspot" onclick="generatePrompt()">Generate</button>
    <button id="hsCopy" class="hotspot" onclick="copyPrompt()">Copy</button>
    <button id="hsSaveBottom" class="hotspot" onclick="openPanel('savePanel')">Save</button>
  </div>
</div>

<!-- Panels -->
<section id="planPanel" class="edit-panel">
  <div class="panel-card">
    <h2 class="panel-title">RUNTIME PROMPT</h2>
    <textarea id="runtimePrompt" placeholder="Generate Runtime Prompt"></textarea>
    <div class="panel-actions">
      <button class="red" onclick="generatePrompt()">GENERATE</button>
      <button onclick="copyPrompt()">COPY</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
  </div>
</section>

<section id="savePanel" class="edit-panel">
  <div class="panel-card">
    <h2 class="panel-title">SAVE FINAL LOG</h2>
    <div class="formgrid">
      <div>
        <label>Date</label>
        <input id="logDate" type="date" />
      </div>
      <div>
        <label>Result</label>
        <select id="result">
          <option>Completed</option>
          <option>Repeat Same</option>
          <option>Graduated</option>
          <option>Transition</option>
          <option>Rest / Delay</option>
        </select>
      </div>
    </div>
    <label>Final log text</label>
    <textarea id="finalLog" placeholder="Paste Kai final log here"></textarea>
    <div class="panel-actions">
      <button class="red" onclick="saveFinalLog()">SAVE SESSION</button>
      <button onclick="document.getElementById('finalLog').value=''">CLEAR</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
  </div>
</section>

<section id="historyPanel" class="edit-panel">
  <div class="panel-card">
    <h2 class="panel-title">HISTORY</h2>
    <div class="formgrid">
      <div>
        <label>Line filter</label>
        <select id="filter" onchange="renderHistory()"><option value="all">All</option></select>
      </div>
      <div>
        <label>Search</label>
        <input id="search" oninput="renderHistory()" placeholder="FL Row, Burpee, 5/25" />
      </div>
    </div>
    <div class="list" id="historyList"></div>
    <div class="panel-actions">
      <button onclick="exportData()">BACKUP</button>
      <button onclick="document.getElementById('importFile').click()">IMPORT</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
    <input id="importFile" type="file" accept="application/json" hidden onchange="importData(event)" />
  </div>
</section>

<section id="settingsPanel" class="edit-panel">
  <div class="panel-card">
    <h2 class="panel-title">SETTINGS</h2>
    <label>Rotation index</label>
    <input type="number" id="rotationIndex" min="0">
    <label>Rotation JSON</label>
    <textarea id="rotationJson"></textarea>
    <button class="panel-button red" onclick="saveRotation()">SAVE ROTATION</button>
    <label>Lines JSON</label>
    <textarea id="linesJson"></textarea>
    <button class="panel-button red" onclick="saveLines()">SAVE LINES</button>
    <div class="panel-actions">
      <button onclick="exportData()">EXPORT</button>
      <button onclick="resetAll()">RESET</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
  </div>
</section>

<div id="toast" class="toast">Saved</div>

<script>
const DEFAULT = {
  createdAt: Date.now(),
  rotationIndex: 0,
  rotation: [
    {slot:"Push", lineKey:"pushHorizontal"},
    {slot:"Pull", lineKey:"pullVertical"},
    {slot:"Complex Push", lineKey:"complexPush"},
    {slot:"Conditioning", lineKey:"conditioning"},
    {slot:"Push", lineKey:"pushVertical"},
    {slot:"Pull", lineKey:"pullHorizontal"},
    {slot:"Complex Pull", lineKey:"complexPull"},
    {slot:"Conditioning", lineKey:"conditioning"}
  ],
  lines: {
    pushVertical:{
      category:"Vertical Push",
      exercise:"PHSPU",
      progress:"5.5 (5×5) [E1]",
      exposure:"E1",
      staticPosition:"Adv. PL 6s / Adv. L-sit 6s",
      mainTemplate:"PHSPU 5.5 (5×5) [E1]\n:"
    },
    pushHorizontal:{
      category:"Horizontal Push",
      exercise:"Str. PL PU",
      progress:"3.5 (3×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. PL 6s / Adv. L-sit 6s",
      mainTemplate:"Str. PL PU 3.5 (3×5) [E2]\n:"
    },
    pullVertical:{
      category:"Vertical Pull",
      exercise:"OAP Negative",
      progress:"3.5 (3×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. FL 6s / Adv. L-sit 6s",
      mainTemplate:"OAP Negative 3.5 (3×5) [E2]\n:"
    },
    pullHorizontal:{
      category:"Horizontal Pull",
      exercise:"FL Row",
      progress:"3.5 (3×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. FL 6s / Adv. L-sit 6s",
      mainTemplate:"FL Row 3.5 (3×5) [E2]\n:"
    },
    complexPush:{
      category:"Complex Push",
      exercise:"BAPL60",
      progress:"5.5 (5×5) [E1]",
      exposure:"E1",
      staticPosition:"Adv. PL 6s / Adv. L-sit 6s",
      mainTemplate:"BAPL60 5.5 (5×5) [E1]\n:"
    },
    complexPull:{
      category:"Complex Pull",
      exercise:"Str. 360 Pull",
      progress:"5.5 (5×5) [E2]",
      exposure:"E2",
      staticPosition:"Adv. FL 6s / Adv. L-sit 6s",
      mainTemplate:"Str. 360 Pull 5.5 (5×5) [E2]\n:"
    },
    conditioning:{
      category:"Conditioning",
      exercise:"Negative + A. Pistol / Burpee",
      progress:"3.3 (3×3) [E1] + Burpee 40x3",
      exposure:"E1",
      staticPosition:"Adv. BL 6s / Adv. L-sit 6s",
      mainTemplate:"Negative + A. Pistol 3.3 (3x3) [E1]\n:\n\nBurpee 40x3\n:"
    }
  },
  logs:[]
};

const STORAGE_KEY = "nsd6_v043";
const LEGACY_KEYS = ["nsd6_v042","nsd6_v041","nsd6_v03","nsd6_v02"];

function clone(obj){return JSON.parse(JSON.stringify(obj))}
function deepMerge(base, incoming){
  const out = clone(base);
  if(!incoming || typeof incoming !== "object") return out;
  Object.keys(incoming).forEach(k=>{
    if(incoming[k] && typeof incoming[k] === "object" && !Array.isArray(incoming[k]) && out[k] && typeof out[k] === "object" && !Array.isArray(out[k])){
      out[k] = deepMerge(out[k], incoming[k]);
    } else {
      out[k] = incoming[k];
    }
  });
  return out;
}
function applyDefaults(state){
  const out = deepMerge(DEFAULT, state || {});
  out.rotation = clone(DEFAULT.rotation);
  Object.keys(DEFAULT.lines).forEach(key=>{
    out.lines[key] = {...(out.lines[key] || {}), ...DEFAULT.lines[key]};
  });
  if(!Number.isInteger(out.rotationIndex)) out.rotationIndex = 0;
  out.rotationIndex = ((out.rotationIndex % out.rotation.length) + out.rotation.length) % out.rotation.length;
  return out;
}
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY) || LEGACY_KEYS.map(k=>localStorage.getItem(k)).find(Boolean);
    return raw ? applyDefaults(JSON.parse(raw)) : clone(DEFAULT);
  }catch(e){
    return clone(DEFAULT);
  }
}
let state = load();
function persist(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state))}

function todayISO(){
  const d = new Date();
  const z = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return z.toISOString().slice(0,10);
}
function week(d){
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d+"T00:00:00").getDay()];
}
function titleDate(d){
  const x = new Date(d+"T00:00:00");
  return `${x.getMonth()+1}/${x.getDate()} ${week(d)}`;
}
function nextMeta(){
  const idx = ((state.rotationIndex % state.rotation.length) + state.rotation.length) % state.rotation.length;
  const r = state.rotation[idx];
  return {...r, ...(state.lines[r.lineKey] || {}), rotIndex:idx};
}
function previousLog(meta){
  return [...state.logs].reverse().find(l=>l.lineKey===meta.lineKey || l.exercise===meta.exercise);
}
function lastSaved(){
  return [...state.logs].reverse().find(l=>l.result !== "Rest / Delay") || state.logs[state.logs.length-1];
}
function buildPlan(meta, d=todayISO()){
  return `${titleDate(d)} — ${meta.slot}

Session time: ~

WU
FR full body
HSPU ×3
Wall Extension 10×2
Band Dislocate 10×2
Static Position
: ${meta.staticPosition || "___ / Adv. L-sit 6s"} —
L Pull-up 5×1

MN
${meta.mainTemplate || `${meta.exercise} ${meta.progress}\n:`}

CD
HVR 10×1
Wall Extension 10×1
Band Dislocate
: dorsal 6×1 —
: overgrip 6×1 —
Passive ROM 6

Notes
:`;
}
function generatePrompt(){
  const meta = nextMeta();
  const prev = previousLog(meta);
  const prompt = `${prev ? prev.logText : `[No previous ${meta.exercise} log saved yet.]`}

⸻

${buildPlan(meta)}

⸻`;
  document.getElementById("runtimePrompt").value = prompt;
  document.getElementById("ovPreview").textContent = prompt.split("\n").slice(0,5).join("\n");
  openPanel("planPanel");
  toast("Runtime prompt generated");
}
async function copyPrompt(){
  let t = document.getElementById("runtimePrompt").value;
  if(!t.trim()){
    const meta = nextMeta();
    const prev = previousLog(meta);
    t = `${prev ? prev.logText : `[No previous ${meta.exercise} log saved yet.]`}

⸻

${buildPlan(meta)}

⸻`;
    document.getElementById("runtimePrompt").value = t;
    document.getElementById("ovPreview").textContent = t.split("\n").slice(0,5).join("\n");
  }
  try{
    await navigator.clipboard.writeText(t);
    toast("Copied");
  }catch(e){
    document.getElementById("runtimePrompt").select();
    document.execCommand("copy");
    toast("Copied");
  }
}
function render(){
  const meta = nextMeta();
  const prev = previousLog(meta);
  const last = lastSaved();

  text("ovExposure", meta.exposure || "E");
  text("ovSlot", (meta.slot || "-").toUpperCase());
  text("ovCategory", (meta.category || "-").toUpperCase());
  text("ovMovement", `${meta.exercise || "-"} ${meta.progress || ""}`.trim());
  text("ovRotation", `Session ${meta.rotIndex + 1} / ${state.rotation.length}`);
  text("ovPrevious", prev ? `${prev.exercise} ${prev.progress}` : "-");
  text("ovProgression", meta.progress || "-");
  text("ovExposureRow", meta.exposure || "-");
  text("ovLastSaved", last ? `${last.date} · ${last.exercise}` : "-");

  const now = new Date();
  text("ovMonth", now.toLocaleString("en",{month:"short"}).toUpperCase()+" "+now.getFullYear());

  const ym = todayISO().slice(0,7);
  const month = state.logs.filter(l=>(l.date||"").startsWith(ym));
  text("ovSessions", month.filter(l=>l.result !== "Rest / Delay").length);
  text("ovRests", month.filter(l=>l.result === "Rest / Delay").length);

  let streak = 0;
  for(const l of [...state.logs].reverse()){
    if(l.result === "Rest / Delay") break;
    streak++;
  }
  text("ovStreak", streak);

  const hours = Math.floor((Date.now() - (state.createdAt || Date.now())) / 3600000);
  text("ovUptime", `${Math.floor(hours/24)}d ${String(hours%24).padStart(2,"0")}h`);

  document.getElementById("logDate").value ||= todayISO();
  fillFilters();
  fillSettings();
  renderHistory();
}
function text(id, value){
  document.getElementById(id).textContent = value;
}
function saveFinalLog(){
  const meta = nextMeta();
  const txt = document.getElementById("finalLog").value.trim();
  const result = document.getElementById("result").value;
  if(!txt && result !== "Rest / Delay"){
    toast("Paste final log first");
    return;
  }
  const date = document.getElementById("logDate").value || todayISO();
  state.logs.push({
    id:String(Date.now()) + Math.random().toString(16).slice(2),
    date,
    result,
    slot:meta.slot,
    lineKey:meta.lineKey,
    category:meta.category,
    exercise:meta.exercise,
    progress:meta.progress,
    logText: txt || `${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${meta.exercise} delayed.`
  });
  if(result !== "Repeat Same"){
    state.rotationIndex = (state.rotationIndex + 1) % state.rotation.length;
  }
  document.getElementById("finalLog").value = "";
  persist();
  render();
  closePanels();
  toast("Session saved");
}
function advanceRotation(){
  state.rotationIndex = (state.rotationIndex + 1) % state.rotation.length;
  persist();
  render();
  toast("Rotation advanced");
}
function markRest(){
  const meta = nextMeta();
  const date = todayISO();
  state.logs.push({
    id:String(Date.now()),
    date,
    result:"Rest / Delay",
    slot:meta.slot,
    lineKey:meta.lineKey,
    category:meta.category,
    exercise:meta.exercise,
    progress:meta.progress,
    logText:`${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${meta.exercise} delayed.`
  });
  persist();
  render();
  toast("Rest / Delay saved");
}
function fillFilters(){
  const f = document.getElementById("filter");
  if(!f) return;
  const old = f.value || "all";
  f.innerHTML = '<option value="all">All</option>' + Object.entries(state.lines).map(([k,v])=>`<option value="${k}">${v.category} — ${v.exercise}</option>`).join("");
  f.value = old;
}
function renderHistory(){
  const list = document.getElementById("historyList");
  if(!list) return;
  const f = document.getElementById("filter")?.value || "all";
  const q = (document.getElementById("search")?.value || "").toLowerCase();
  const logs = [...state.logs].reverse().filter(l=>(f === "all" || l.lineKey === f) && JSON.stringify(l).toLowerCase().includes(q));
  list.innerHTML = logs.length ? "" : "<div class='logitem'>No logs yet.</div>";
  logs.slice(0,80).forEach(l=>{
    const div = document.createElement("div");
    div.className = "logitem";
    div.innerHTML = `
      <h3>${esc(l.date)} · ${esc(l.exercise)} · ${esc(l.result)}</h3>
      <pre>${esc((l.logText || "").split("\n").slice(0,10).join("\n"))}</pre>
      <div class="panel-actions">
        <button onclick="copyLog('${l.id}')">COPY</button>
        <button onclick="deleteLog('${l.id}')">DELETE</button>
        <button onclick="reuseLog('${l.id}')">USE AS PREV</button>
      </div>
    `;
    list.appendChild(div);
  });
}
async function copyLog(id){
  const l = state.logs.find(x=>x.id===id);
  if(!l) return;
  await navigator.clipboard.writeText(l.logText);
  toast("Log copied");
}
function reuseLog(id){
  const l = state.logs.find(x=>x.id===id);
  if(!l) return;
  document.getElementById("runtimePrompt").value = `${l.logText}

⸻

${buildPlan(nextMeta())}

⸻`;
  openPanel("planPanel");
  toast("Loaded");
}
function deleteLog(id){
  if(!confirm("Delete this log?")) return;
  state.logs = state.logs.filter(x=>x.id!==id);
  persist();
  render();
  toast("Deleted");
}
function fillSettings(){
  document.getElementById("rotationIndex").value = state.rotationIndex;
  document.getElementById("rotationJson").value = JSON.stringify(state.rotation,null,2);
  document.getElementById("linesJson").value = JSON.stringify(state.lines,null,2);
}
function saveRotation(){
  try{
    state.rotationIndex = Number(document.getElementById("rotationIndex").value) || 0;
    state.rotation = JSON.parse(document.getElementById("rotationJson").value);
    persist();
    render();
    toast("Rotation saved");
  }catch(e){toast("Invalid JSON")}
}
function saveLines(){
  try{
    state.lines = JSON.parse(document.getElementById("linesJson").value);
    persist();
    render();
    toast("Lines saved");
  }catch(e){toast("Invalid JSON")}
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `nsd6_backup_${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      state = applyDefaults(JSON.parse(r.result));
      persist();
      render();
      toast("Imported");
    }catch(err){toast("Import failed")}
  };
  r.readAsText(file);
}
function resetAll(){
  if(!confirm("Reset app data? Export backup first.")) return;
  state = clone(DEFAULT);
  persist();
  render();
  toast("Reset");
}
function openPanel(id){
  closePanels(false);
  document.getElementById(id).classList.add("active");
}
function closePanels(doRender=true){
  document.querySelectorAll(".edit-panel").forEach(p=>p.classList.remove("active"));
  if(doRender) render();
}
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1400);
}
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
render();
</script>
</body>
</html>
