<script type="application/json" id="seedData">{"blocks":[{"id":"mptubfwi3xv3wtb","month":"2026-05","title":"2026-05","text":"NSS-77TR RECORD\n\n⸻\n\nNSS-77TR — Monthly Core Summary [2026-05]\n\nMay functioned as a transition-closure / NSD-6 re-entry month, not a simple continuation month. Total logged days reached 31, with 27 completed sessions and 4 Rest / Delay entries. The month included multiple previous-stage graduations, full NSD-6 line replacement, new lower-level technical entries, and the first practical STATUS → RECORD transfer test. The main character of May was therefore not just training continuation, but system conversion: completed 7-level lines became the base for new movement maps.\n\nMay should be defined as\n\nprevious 7-level closure + NSD-6 line transition + new movement mapping + record-system integration.\n\nOverall character of the month\n\nMay began by closing several lines from the previous transition block. Adv. PL PU, HSPU, BAPL45, A. OAP, and Str. FL Row all reached closure or graduation-quality markers. After those closures, the system did not continue by simply adding more volume to the same movements. Instead, it shifted into new entries: PHSPU, Str. PL PU, OAP Negative, FL Row, BAPL60, Str. 360 Pull, and Negative + A. Pistol.\n\nThe important point is that these new entries began at lower levels without behaving like regressions. The earlier 7-level base carried over as support tolerance, rhythm familiarity, lever control, and signal clarity. May therefore acted as a conversion month where old endpoints became new baselines.\n\nCurrent working hypothesis\n\nLower-level re-entry after 7-level closure is not a reset. In the current system, it functions as a mapping phase for longer levers, deeper ROM, new setup constraints, and more specific signal interpretation. Progression quality should be judged by how quickly the new line attaches cleanly, not by whether the visible level number is high.\n\nRest / Delay entries also remained compatible with the rotation. They did not break the system as long as the next actual completed session resumed from the correct line state.\n\nPrimary stage-transition lines\n\nHSPU / PHSPU\n\nHSPU completed 7.7 E2 and can be marked as graduated. The key May change was not a single peak set, but repeated operating stability under non-ideal starting condition. Several sets reproduced 6+ continuity, and one important in-set recovery appeared when a forward-diagonal bent line was held, re-centered, and continued without coming down.\n\nAfter graduation, the vertical push line transitioned into PHSPU. PHSPU immediately changed the problem from free-balance / floor support into deeper ROM and parallette setup management. Wrist load reduced clearly, while entry / exit cost and face-to-hand ROM became the main practical variables.\n\nAdv. PL PU / Str. PL PU\n\nAdv. PL PU completed 7.7 E2 and graduated cleanly. The 7-level horizontal push no longer behaved like a major event. It felt more like an operating checkpoint, with local shoulder load fading into the background and trunk control remaining the main task.\n\nAfter that, the line transitioned into Str. PL PU. The new working shape was not yet a clean full straddle line. It appeared as a compact frog / straddle-L-like intermediate push. The main limiter shifted from pressing output to pelvis, hip, and leg-position mapping.\n\nA. OAP / OAP Negative\n\nA. OAP closed at 7.7 E3. It remained one of the hardest lines, but May showed the clearest improvement in output and stamina since A.OAP became the vertical-pull line. Dead-hang pass-through became more available, sway stayed low, and S1 reached the best output so far.\n\nThe line then moved into OAP Negative. This confirmed that full one-arm negative is not yet available. The current negative work remains support-dependent, with close-hand start, main-arm loading, hook-like grip tendency, forearm demand, and one-arm dead-hang transition becoming the main information points. OAP Negative now functions as a cleaner range / load-mapping phase rather than a volume target.\n\nStr. FL Row / FL Row\n\nStr. FL Row completed 7.7 E2 and closed the previous horizontal-pull transition block. The endpoint was not a polished full straddle row, but stable frog-like working row plus Str reference access. Row identity remained intact even when late-session ROM reduced.\n\nFL Row then entered better than expected. Removing the straddle split reduced pelvis / hip noise, and the working shape became closer to a bent-knee full-lever-like row. The row trajectory was small but alive. This suggests that the row pattern transferred successfully from Str. FL Row into a cleaner full-line preparation.\n\nBAPL45 / BAPL60\n\nBAPL45 completed 7.7 E2 and graduated through pendulum-based continuous rotation. The important carryover was rhythm, not static strength. Lever fixation, toe extension, and rebound rotation became repeatable under 7-level volume.\n\nBAPL60 then entered as the new Complex Push line. The first exposures corrected the assumption that 80–90° BAPL would be almost impossible. BAPL60 worked through rebound-assisted / pendulum-driven rotation rather than static holding. By 5.5 E1, the line attached cleanly: S1 showed mild entry signal, S2 connected the pendulum rhythm, S3 stabilized lever / rotation synchronization, and S4 reached near-90° rotation through inertia rather than forced output.\n\nAdv. 360 Pull / Str. 360 Pull\n\nAdv. 360 Pull had already graduated at the end of April, and May converted that rhythm base into Str. 360 Pull. The new line immediately exposed setup limits: doorway space, back-lever-side foot contact, limited straddle width, and near-full-like lever moments.\n\nStr. 360 Pull progressed through 3.3, 3.5, and 5.5 exposure. The movement became more familiar, but forearm accumulation and back-side pelvis opening remained the main costs. The next task is smoother pass-through rhythm and cleaner back-lever-side pelvis extension, not static hold polishing.\n\nConditioning / Lower-chain line\n\nThe lower-chain line shifted from Pistol Negative volume toward assisted-ascent mapping. Pistol Negative progressed through 6-level and 7-level exposure, but May clarified that more negative volume was no longer the highest-value target. R side remained landing-control dominant, while L side showed clearer bottom-hold access and early ascent-initiation signal.\n\nNegative + A. Pistol entered after this. Ring-assisted ascent was rejected because it changed the ascent trajectory. Floor-hand-assisted ascent became the current transition method. L side connected better through bottom hold into light hand assist, while R side still needs mapping around hand position, forward body curl, foot pressure, and assisted-ascent path.\n\nBurpee 40×3 stayed in the conditioning slot, but its role became more diagnostic. Palm / wrist support-contact warning appeared earlier in the month, then disappeared after pistol arms-forward adjustment. Later sessions showed R shoulder pop during jump-back transition, with farther-forward hand placement reducing the pop. Conditioning therefore continued as both circulation work and support-contact signal inspection.\n\nSignal / fatigue status\n\nMay showed good structural tolerance despite repeated line transitions. Shoulder signals appeared frequently, but most were residual, rhythm-related, setup-related, or post-set traces rather than stop-level warnings. R shoulder residual remained the most common repeated trace, especially around band work, support lines, BAPL rotation, and burpee transitions.\n\nPalm / wrist support-contact warning appeared but did not become a persistent limiter. PHSPU reduced wrist burden through parallettes, while OAP Negative and Str. 360 Pull shifted load toward forearm, grip, and hook-control demand.\n\nLower-chain signals stayed mostly non-painful. Knee pops appeared around pistol bottom work, but the more important limiter was bottom-hold control, ankle / foot-pressure mapping, and assisted-ascent path. DOMS or ordinary local fatigue did not define the month. Movement quality and signal interpretation mattered more than soreness.\n\nSystem interpretation\n\nMay confirmed that NSD-6 is now functioning as a rotation of transition lines rather than a list of isolated exercises. Earlier main movements are becoming warm-up exposures, signal checks, or base conditions for the next line.\n\nHSPU became the base for PHSPU. Adv. PL PU became the base for Str. PL PU. A. OAP became the base for OAP Negative. Str. FL Row became the base for FL Row. BAPL45 became the base for BAPL60. Adv. 360 Pull became the base for Str. 360 Pull. Pistol Negative became the base for Negative + A. Pistol.\n\nThis is the clearest system-level change in May. The month did not simply add more difficulty. It reorganized completed lines into a new operating map.\n\nMonthly conclusion\n\nMay was a transition-closure and NSD-6 re-entry month. The month closed several 7-level lines, then converted them into new lower-level technical entries. These lower-level entries did not behave like regressions. They carried over the previous block’s support tolerance, rhythm base, lever awareness, and signal clarity.\n\nOverall, May should be marked as\n\nthe month where the previous 7-level transition block closed, NSD-6 became the active operating structure, and new movement lines began mapping from a stronger base rather than from zero.\n\nThe next phase should not rush level escalation. The main task is to preserve clean mapping, rhythm attachment, and signal stability while each new line builds its own usable operating pattern.\n\n⸻\n\n5/31 Sun — Complex Push\n\nSession time: ~50m\n\nWU\nFR full body\nHSPU ×3\n: performed as 1 / 1 / 3\n: first two entries ended with negative-style drops\n: then 3 continuous mid-ROM reps attached\nWall Extension 10×2\n: normal\nBand Dislocate 10×2\n: slight R shoulder residual\n: slight load sensation\nStatic Position\n: Adv nctioned as a successful Str. PL PU intermediate-structure stabilization session\n\n⸻\n\n5/28 Thu — Conditioning\n\nSession time: ~1h\n\nWU\nFR full body\nHSPU ×3\n: 3 continuous reps\n: final push output felt slightly low\n: descended while pushing out\n: continuous balance itself was not bad\nWall Extension 10×2\n: normal\n: ROM slightly reduced\nBand Dislocate 10×2\n: still slightly stiff\nStatic Position\n: Adv. BL 6s / Adv. L-sit 6s\n: slight load appeared on the back-lever side, likely from yesterday’s main work\nL Pull-up 5×1\n: normal\n\nMN\nNegative + A. Pistol 3.3 (3×3) [E1]\nS1\n: Ring Assisted Pistol did not work well\n: ring assist changed the standing-up trajectory\n: plan changed to floor-hand-assisted ascent\n: after negative descent, body direction / hand position was adjusted\n: ascent was assisted by placing the hand on the floor\n: session changed to Negative + A. Pistol 3.3 E1\nS2\n: overall movement sequence still felt unfamiliar\n: assisted ascent felt harder than expected\n: R side did not attach to bottom hold today\nS3\n: R side still did not rise well even with assistance\n: assisted ascent itself did not feel natural on R\n: L side entered bottom hold, then rose by lightly pushing the floor with the R hand\n: Pistol main work was stopped here\nMN Notes\n: Negative + A. Pistol 3.3 E1 was completed as an assisted-ascent mapping session\n: Ring Assisted Pistol was rejected because it changed the ascent trajectory\n: floor-hand-assisted ascent was adopted as the current transition form\n: R side did not connect well to ascent even with assistance\n: R assisted-ascent path felt unnatural today\n: L side connected better, using bottom hold followed by light R-hand floor assist\n: today’s value was mapping the ascent-assist method rather than recovering volume or forcing completion\n: next Pistol exposure should continue exploring natural floor-hand-assisted ascent, especially on R side\n\nBurpee 40×3\nS1 — 1′33″\nS2 — 1′27″ / 3′00″ cum.\nS3 — 1 ch rotation point should be minimized\n: movement should prioritize continuous rotation / pass-through rather than static holding\n: forearm load became the main limiting factor in S4–S5\n: late fatigue appeared as increased pelvic fold and reduced ability to open the lumbar / pelvis line during back-lever transition\n: Straddle-type lever work now feels more familiar, even though the form is not yet fully clean\n\nCD\nHVR 10×1\n: later reps produced abdominal load\n: slight lumbar load also appeared\nWall Extension 10×1\n: normal\n: ROM remained reduced\nBand Dislocate\n: dorsal 6×1 — stiff\n: overgrip 6×1 — stiff\n: slight shoulder soreness / stiffness remained similarly\nPassive ROM 6\n: no notable issue\n\nNotes\n: session completed Str. 360 Pull 5.5 E1 in ~57m\n: today confirmed that Str. 360 can enter 5-level volume under the current doorway setup\n: the movement is still setup-limited, especially around back-lever-side space and foot contact\n: front / back transition should stay rhythm-based, with minimal stop-point holds\n: late-set forearm load and pelvic fold are the main current costs\n: next exposure should focus on smoother pass-through rhythm, forearm management, and cleaner back-lever-side pelvis extension rather than increasing hold quality.\n\n⸻\n\n5/26 Tue — Rest / Delay\n\nComplex Pull / Str. 360 Pull delayed.\n\n⸻\n\n5/25 Mon — Pull\n\nSession time: ~42m\n\nWU\nFR full body\nHSPU ×4\n: 4 continuous reps\n: first 2 reps reached deep ROM\n: last 2 reps were mid-to-shallow ROM\nWall Extension 10×2\n: normal\n: ROM slightly reduced\nBand Dislocate 10×2\n: slight posterior-shoulder residual\nStatic Position\n: Adv. FL 6s / Adv. L-sit 6s\n: no notable issue\nL Pull-up 5×1\n: slightly hard\n\nMN\nFL Row 3.3 (3×3) [E1]\nS1\n: pelvis felt more stable than in Str. FL Row\n: this may have been because there was no straddle-split demand\n: hold check was not emphasized\n: shape was close to full lever with only very slight knee bend\n: row was performed in ed with glute contact\n: L side showed a similar pattern\n: L final rep reached a brief hold-like bottom position\n: opposite knee was intentionally not controlled and stayed bent\n: after reps, bottom-hold position was intentionally paused for ~3s to search for the hold feel\nS2\n: overall pattern similar to S1\n: bottom hold every rep was too hard\n: forced bottom-hold was performed separately for ~2–3 attempts\n: ankle-side control felt insufficient\n: ankle effort was clearly high\n: R bottom-hold shape itself was difficult to set\n: R side needed hand assist to rise / reset\n: L side could shift from glute-contact bottom into hold shape with arms extended\nS3\n: R final rep used forced bottom-hold maintenance attempt\n: L final rep was performed with focused natural bottom-hold maintenance\n: L side held more naturally than R\n: bottom work was concentrated on the final reps rather than every rep\nS4\n: R side remained similar to previous sets\n: L side achieved slight forced bottom hold\n: L side could maintain natural bottom hold through 4 reps\n: L final rep used slow glute contact, then brief forced bottom hold\nS5\n: R side remained similar\n: L side achieved short natural bottom-hold style reps except rep 1\nMN Notes (Pistol Negative)\n: Pistol Negative 5.5 E2 volume was completed\n: 5-level zone does not need a separate graduation judgment\n: next exposure can move to Pistol Negative 6.6 E1\n: full-bottom entry was maintained across the session\n: R side still showed difficulty assembling the bottom-hold shape\n: L side showed clearer natural bottom-hold access, especially from mid-session onward\n: ankle / foot-pressure control felt like the main limiting factor\n: opposite-knee control was intentionally deprioritized to focus on bottom-hold sensation\n: forced bottom hold after glute contact functioned as 1-level bottom-position work\n: shoulder pops appeared around the bottom / arm-forward position, likely from pistol bottom posture and arm-scapular counterbalance rather than direct shoulder work\n\nBurpee 40×3\nS1 — 1′42″\nS2 — 1′29″ / 3′11″ cum.\nS3 — 1′29″ / 4′40″ cum.\n: S1 pace was intentionally reduced\n: focus was placed on palm sensation and posture\n: palm-end sensation appeared, similar to the first previous Pistol Negative session\n: slight wrist-side sensation also appeared\n: signal appeared on both sides, slightly more on R\n: intermittent shoulder pops appeared, but similar to previous burpee patterns and not a special issue\n: pace dropped during the final ~10 reps of S3 due to clear conditioning fatigue\n: feeling of being physically drained by burpee appeared for the first time in a while\nMN Notes (Burpee)\n: Burpee 40×3 was completed\n: support-line signal appeared but did not reach stop-level warning\n: palm-end / wrist-side sensation suggests upper-limb support line was still not completely quiet\n: signal distribution was bilateral, with slightly stronger R-side sensation\n: conditioning fatigue appeared clearly in the final part of S3\n: today’s burpee confirmed both recoverable support-line tolerance and return of conditioning load sensation\n\nCD\nHVR 10×1\n: V-raise was actually good\n: later reps felt more abdominal-load dominant\n: slight lumbar load appeared\nWall Extension 10×1\n: normal\nBand Dislocate\n: dorsal 6×1 — slightly stiff\n: overgrip 6×1 — relatively smooth, slight shoulder load\nPassive ROM 6\n: no notable issue\n\nNotes\n: session completed the planned Pistol Negative 5.5 E2 volume\n: Pistol Negative can move next to 6.6 E1 without separate 5-level graduation labeling\n: full-bottom access remained available\n: L side showed clearer natural bottom-hold connection\n: R side remained more dependent on forced shape assembly / assist\n: ankle / foot-pressure control was the clearest lower-chain limiter\n: Burpee 40×3 was completed after intentionally controlled pacing\n: palm-end / wrist-side support signal appeared but stayed manageable\n: burpee produced a rare clear co able bent planche line rather than a copied static shape\nS2\n: upper-shoulder load became strong, but felt like necessary working load rather than problematic load\n: ROM entered fairly deep, similar to old tuck planche push-up feel\n: working shape felt close to full bent\n: key seemed to be keeping tempo from slowing down\n: 7-level success depended more on avoiding drag / stalling than on forcing slow control\nS3\n: no notable issue\n: shoulder load decreased\n: slight R upper / posterior-shoulder load appeared in the background\n: 7-level accumulation was not yet apparent\n: trunk maintenance required a more operational form adjustment\nS4\n: shoulder load no longer stood out\n: accumulated output began to appear\n: trunk did not bounce or collapse, but body angle became less clean\n: final rep felt slightly hard\nS5\n: similar to S4\n: final rep was relatively hard\n: structure still held\n: mirror check gave a noticeably fuller upper-body impression, especially around shoulders / upper arms / arms\nS6\n: accumulated output similar to previous sets\n: overall pattern remained stable\n: final rep rose with slight trunk rotation\n: this appeared to reflect increasing trunk / angle-control cost rather than pure pressing failure\nS7\n: focused on trunk control\n: bent shape remained intact\n: volume was recovered at a similar quality level to the previous sets\n: full 7.7 volume completed\nMN Summary\n: Adv. PL PU 7.7 E1 was completed successfully\n: this felt close to graduation-ready already at E1\n: volume was not a major issue\n: bent operating shape remained reproducible across the full 7×7 structure\n: shoulder load appeared as normal working load and did not become a limiting signal\n: the main limiter was trunk angle / forward-lean control rather than shoulder pain or pressing shortage\n: R wrist load appeared from mid-late sets, but remained below signal level\n: R wrist / lower-forearm load likely came from controlling forward trunk lean through grip / forearm pressure on parallettes\n: rest timer was started quickly with little time loss, suggesting overall output reserve remained\n: compared with 6.6 E2, 7.7 E1 felt less like a new challenge and more like confirmation of an already prepared bent-push baseline\n\nCD\nHVR 10×1\n: from mid reps, shoulder support-zone load felt strong, likely due to push-session residue\n: considered switching to ordinary raise range, but continued because it remained tolerable\nWall Extension 10×1\n: ROM reduced\n: front chain felt locked\nBand Dislocate\n: dorsal 6×1 — first rep stiff, then became smoother\n: overgrip 6×1 — similar pattern\n: little residual signal remained\n: shoulder fatigue became more apparent after the session\nPassive ROM 6\n: no notable issue\n\nNotes\n: today was a strong post-downshift re-entry session\n: despite being a 7-level entry session, pace was fast and concentration felt high\n: yesterday’s shortened conditioning session may still have provided enough cleanup / reset effect\n: no significant carryover from yesterday’s L palm signal appeared during the main push work\n: R posterior-shoulder residual was much reduced from the previous day\n: main session confirmed that Adv. PL PU 7.7 is already near graduation range, with E2 likely serving mainly as reproducibility confirmation\n: cooldown showed front-chain locking and shoulder support fatigue, but no structural restriction or risk signal appeared\n: session closed cleanly overall\n\n⸻","createdAt":"2026-05-31T13:53:29.922Z","updatedAt":"2026-05-31T13:53:29.922Z"},{"id":"mpt64df4qhgswp8","month":"2026-04","title":"2026-04","text":"NSS-77TR RECORD\n⸻\nNSS-77TR — Monthly Core Summary [2026-04]\nApril functioned as a\n7-level re-entry / expansion month\n, not a simple continuation month.\nTotal sessions reached\n27\n, marking one of the highest monthly frequencies so far. The month included multiple 7-level entries, one clear graduation, full-bottom pistol access, HSPU continuous-volume PR, and alate-month neural downshift signal. The main character of April was therefore not just high volume, but\nhigh-frequency operation under expanding level zones\n.\nApril should be defined as:\n7-level expansion + first current-stage graduation + full-ROM lower-chain unlock + high-frequency neural-limit observation.\nOverall character of the month\nApril was a high-density month where the system operated close to its current upper frequency range.\nUnlike March, which involved a visible downshift / interruption window during stage transition, April showed mostly continuous execution through the majority of the month. The system did not collapse underincreased level demand. Instead, most main lines either entered 7-level, stabilized 6-level, or opened new ROM territory.\nHowever, the late-month forced shutdown / neural fatigue event suggests that the limiting factor is likely not local muscular fatigue or joint irritation, but\ncumulative neural execution load\nunder high-frequencyoperation.\nCurrent working hypothesis:\n~15 consecutive sessions\nmay represent a high-adaptation / high-focus zone.\n~18–20 consecutive sessions\nmay become a neural downshift risk zone.\nDownshift signs are not typical DOMS or structural fatigue, but repeated sleepiness, mood drop, driving drowsiness, and automatic sleep / shutdown.\nThis should remain a working hypothesis, not a fixed rule yet.\nPrimary stage-transition lines\nHSPU\nHSPU made one of the clearest jumps in April.\nEarlier HSPU work still depended heavily on kick-up quality, first descent attachment, and shallow-ROM continuity. By 4/26, HSPU entered\n7.7 E1\n, and the session produced a new continuous-volume PR with\n7continuous shallow-ROM reps\n. Several later sets reproduced 7-rep continuity or strong segmented completion, confirming that the first set was not a one-off event.\nThe main gain was still\ncontinuity and work capacity\n, not ROM depth.\nKey changes:\n7 continuous shallow-ROM reps became available.\nWrist local burden reduced clearly.\nSupport load spread through palm / lower forearm / wrist line.\nKick-up / line attachment remained the primary limiter, not pressing strength.\nHSPU moved from fragmented execution toward repeatable volume operation.\nCompared with the previous 6.6 E2 pattern, April’s 7.7 E1 was a different level of continuity and total work capacity.\nStr. FL Row\nStr. FL Row stabilized through\n6.6 E2\n.\nThe key April change was not full horizontal straddle row completion, but the emergence of a clearer\nnear-horizontal reference hold\nand a more stable compact working row.\nEarly reference holds approached horizontal with only slight pelvic fold. Lower-lat / side-lat tension became strongly perceptible during the initial reference hold. Under accumulation, the actual working form stilleconomized toward a frog-like / compact advanced-straddle intermediate shape, but row identity stayed intact.\nMost important improvement versus E1:\nNo clear progressive ROM / trajectory collapse appeared.\nSide-lat / lower-lat pumping confirmed the pulling line stayed active.\nReference hold became a marker, not the main task.\nWorking form remained repeatable under accumulation.\nThis line now functions as a\nStr lever preparation line\n, and its later graduation should naturally transition toward Full FL Row rather than over-polishing straddle form as an endpoint.\nAdv. 360 Pull\nAdv. 360 Pull became the first clear graduation of the current stage set.\nOn 4/28,\nAdv. 360 Pull 7.7 E2\ncompleted successfully and can be marked as\ngraduated\n. The major transition was mechanical, not merely volumetric.\nE1 showed that slower or hesitant rotation increased forearm burden and strap instability. E2 reproduced the faster rhythm solution from the beginning of the session.\nKey changes:\nFaster rhythm reduced front-back strap swing.\nForearm was no longer the main limiter.\nFront / back lever transition points were passed through rather than held with static braking.\nInertia shifted from a load source into a usable rhythm component.\nS5–S6 still showed remaining output.\nS7 closed without breakdown.\nAdv. 360 Pull changed from a\nforearm / strap-control task\ninto a\nrhythm-driven rotation task\n.\nNext progression can move toward\nStr. 360 Pull\n, with space management, ring length, and lever-length handling expected to become the next practical issues.\nComplex Push / BAPL\nBAPL45 moved into\n7.7 E1\nand showed a major rhythm / lever-fixation shift.\nThe key change was the transition from stop-reset control into pendulum-style continuous rotation. The session produced a peak set where lever fixation, rhythm, rotation, and energy reuse integrated clearly.\nKey points:\nRotation timing and lever fixation improved through the session.\nContinuous pendulum-style rotation became available.\nMid-session rhythm reduced rep-time and improved efficiency.\nPeak work suggested perceived ROM beyond a pure 45° class.\nLater sets showed fatigue and reduced ROM, but structure remained intact.\nThis line now appears to be transitioning from “finding the rotation” to “operating the rotation.”\nConditioning / Lower-chain line\nApril contained the clearest lower-chain event so far:\nfull-bottom pistol access opened\n.\nOn 4/21, both sides entered true full-bottom pistol depth for the first time. This did not feel like gradual ROM extension, but more like a previously locked lower range suddenly opening.\nThen:\n4/25:\nPistol Negative 3.5\n4/30:\nPistol Negative 5.5 E1\nThe 3.5 session established repeated full-bottom entry and early bottom control. The 5.5 session expanded full-ROM negative volume from\n15 total reps to 25 total reps\n.\nCurrent phase:\nrange opened → range repeatedly entered → bottom control begins\nKey observations:\nR side can enter full bottom and achieved brief holds, but bottom posture retention remains inconsistent.\nL side shows better descent stability and bottom control.\nKnee pops appear mostly around first deep-bottom entries, without pain.\nBottom-hold limitation likely involves ankle / foot-pressure control and opposite-leg active hold, not just strength.\nSlow glute landing is useful bottom-braking practice, not a failed rep.\nBurpee remained strong overall. 4/25 produced\n4:17\nwith light perceived effort, near PB range, but 4/30 was intentionally cut early due to L palm / upper-limb support signal rather than systemic fatigue.\nConditioning therefore served two roles in April:\n1.\nLower-chain ROM expansion and consolidation.\n2.\nSystem cleanup / circulation between high-level push-pull-complex blocks.\nSignal / fatigue status\nApril showed strong structural tolerance.\nDOMS and same-day condition became less decisive for session outcome. Even with mild residuals, most sessions could proceed because load was absorbed through structure rather than concentrated locally.\nMajor positive signal trends:\nLocal wrist burden decreased during HSPU.\nShoulder signals were mostly residual or post-set, not movement-limiting.\nLat / lower-lat activation became clearer in pull lines.\nBAPL and 360 Pull shifted toward rhythm-based load distribution.\nPistol full-bottom work produced pops without pain and no major residual restriction.\nHowever, late April also produced a neural downshift / forced rest signal. This differed from ordinary fatigue:\nrepeated sleepiness during the day\ndriving drowsiness\nmood drop / nervous system flatness\nautomatic sleep after work\nno clear local muscular or joint failure\nThis suggests the likely limiter is\ncumulative neural execution load\n, especially around 18–20 consecutive high-focus sessions.\nSystem interpretation\nApril confirmed that NSD-6 is functioning as a six-directional synergy system rather than a simple list of exercises.\nThe six main session types:\nvertical push\nhorizontal push\nvertical pull\nhorizontal pull\ncomplex push\ncomplex pull\nappear to raise the shared base of scapular control, ribcage / pelvic stacking, grip / forearm support, lev e times, body-line fixation improved, and shoulderload was essentially absent during main work. The main gain was continuity, not ROM depth. Warm-upHSPU exposure appears to have contributed directly to this change.\nA.OAP\nA.OAP showed one of the clearest transition improvements in March. By 5.5 E2, the earlier R/L gapnarrowed significantly. The L side caught up and even became the more stable side, while the R sideremained stronger early but less stable / less durable later. Top-range ROM was pursued withoutopposite-shoulder contact or trunk-rotation compensation. Post-session load concentrated in the innerbiceps bilaterally rather than the shoulders. This line no longer looked like an uncertain entry attempt,but like a line beginning to organize itself under actual runtime rules.\nAdv. PL PU / BAPL complex push lines\nThese lines reflected transition through structure rather than through visible completion. Adv. PL PU5.5 E1 showed clear bent descent-path emergence beyond tuck criteria, with early adv-like linemaintenance for roughly 1–2 reps before later reps gradually shifted toward a more vertical / tuck-L-sit-like angle. The late-rep limiter was insufficient protraction output rather than shoulder blockage.BAPL45 5.5 E2 remained volumetrically performable despite shoulder load/signals, and the final limiterwas cumulative output / concentration loss rather than structural failure. This means the push-complexlines were not blocked; they were transitional and still reorganizing under cost.\nSecondary lines\nStr FL Row / Adv. 360 Pull\nThese lines showed that pull-side transition was also becoming more real rather than merelyexploratory. Str FL Row 3.5 E2 confirmed actual row emergence beyond simple hold survival. Adv. 360Pull 5.5 E2 repeated stably even under residual DOMS / heavy-body condition, with BL recovery burdenlower than before and adv lever fixation feeling more natural than in the earlier 3-level phase.\nConditioning line (separate from stage-transition evaluation)\nPistol 7.7 should remain outside the main stage-transition interpretation. It functioned as aconditioning-fixed line throughout the month. Under 1:30 rest and relatively fast tempo, the free-legpattern remained stable and even became more settled in later sets. Burpee progressed from stableeven-paced output into a clear 4′08″ PB by 3/29. Conditioning therefore served as a stable parallel linerather than a transition indicator.\nSignal / fatigue status\nMarch included a real downshift window, but the important point is that the downshift did notcollapse the month. After the interruption, runtime continuity returned. Shoulder signals appearedmostly as local, task-bound load signals rather than persistent structural warnings. By month end, thesystem was again capable of producing clean session closures with manageable residual cost.\nConclusion\nMarch was a 3-level stage-transition month with interruption inside it. It should not be framed as afresh 7-level expansion month. The real story was that stage transition had already begun around lateFebruary to early March, then passed through a neural downshift / break period, yet still finished themonth with visible reconnection and clearer runtime continuity. HSPU moved out of purefragmentation, A.OAP asymmetry narrowed, complex push / pull lines became more structurallyreadable, and conditioning remained stable as a separate fixed line. With 23 total sessions, March wasnot low-volume. It was a disrupted but still substantial month that ended in reconnected transitionrather than regression.\n⸻\n3/31 Tue — Push\nSession time: ~57m\nWU\nFR full body\n: low-load rolling produced weak residual L shoulder pain-like signal\nHSPU ×3\n: shallow ROM intentionally kept lower\n: 3 consecutive reps succeeded immediately for the first time\nWall Extension 10×2\n: normal\n: slight shoulder load\n: improved on 2nd set\nBand Dislocate 10×2\n: slight shoulder fatigue\n: felt like starting the engine\nMini FSP\n: T. PL 6s / Ad Trajectory consistency improved, and the most stable execution was observed on 1/31.\n\nSystemic cost reached its lowest level to date.\n\nBAPL\n\nBAPL progressed into 6.6.\n\nThe line behaved as an emergence-based skill rather than an output-limited task. Trunk-led rotation proved superior to limb-driven attempts.\n\nShoulder signals appeared only with alignment loss, and no pain signals were recorded.\n\nConditioning\n\nBurpee 40×3 progressed from paced completion to a new PB of 5′24″ total.\n\nThe PB was achieved during a low-intent session, indicating elastic efficiency gain. Conditioning cost remained low relative to output.\n\nAssisted Pistol\n\nAssisted Pistol identified the ROM gate as neural / structural rather than strength-based.\n\nThe arms-forward + core-lead strategy released the depth restriction, and balance asymmetry reduced across sessions.\n\nSystem behavior & signals\n\nShoulders\n\nNo pain signals appeared throughout the month.\n\nResidual echoes were transient and self-resolving. End-of-month shoulder condition was the best since mid-December.\n\nLumbar / core\n\nOccasional myofascial pop events appeared during HLR.\n\nThese were interpreted as axial fatigue markers. Immediate self-termination was applied correctly, with no carryover or instability.\n\nDOMS / pump\n\nDOMS remained minimal to absent despite increased volume.\n\nPump was transient. Shape re-stabilized rapidly after sessions.\n\nAdaptation favored internal density and coordination rather than visible swelling or fatigue residue.\n\nStructural & neural adaptation\n\nThe concept of fixed rest effectively dissolved.\n\nRecovery was managed through output modulation rather than time-off.\n\nThe 7-rep zones were perceived as neural capacity tests. High-frequency execution improved next-day performance, and movement control became increasingly automatic.\n\nKey characteristics of January\n\nOutput became quieter, not louder.\n\nFailures were replaced by early modulation or clean termination.\n\nLogs shifted from sensation-heavy to structure-heavy.\n\nStability allowed Level 7 entry without a preparatory deload.\n\nConclusion\n\nJanuary confirmed that the NSS-77TR system can sustain high frequency, Level 7 workloads, and no fixed rest days without loss of structural integrity or signal clarity.\n\nThe month marks a transition from capacity building to emergent skill expansion under stable load.\n\nSystem state at month end: locked, quiet, and expandable.\n\nNext phase\n\nNew movement entries at lower levels, especially Lv-up 3.x, can proceed safely.\n\nThe Level 7 base remains intact and non-fragile.\n\n⸻\n1/31 Sat — Pull\nSession time: ~54m\nWU\nFR full body (light, 2 passes)\nHS ×2 (1KU / 2KU)\nWall Ext 10×2 : upper trap load S2\nBand Dislocate 10×2 : L posterior faint → clear\nMini FSP : T.FL 6s / L-sit 6s\nState: no DOMS, condition high\nMN\nAdv. FL Row 6.6 (6×6) [E2]\nS1 : exploratory, ROM variable, knee touch ×3, trajectory acceptable\nS2 : knee touch none, rhythm ↑, ascent smoother, rep6 demanding\nS3 : tempo ↑, rhythmic, slight ROM gate at rep6\nS4 : most effortless set, posture stable, minimal effort\nS5 : ROM gradually ↓ from rep5, brief pre-rep6 hold\nS6 : similar to S5, ROM gated at rep6, clean finish\nNotes:\n– ROM auto-gated with volume\n– Trajectory stable, no forced holds\n– Output reserve present\n– Most stable AFL Row session to date\nCD\nHLR 10×1 : early L ant shoulder echo (very faint), late reps L lumbar pop ×2 (small)\nWall Ext 10×1 : normal\nBand Dislocate do-sal 6×1 : smooth\nBand Dislocate overgrip 6×1 : smoother\nPassive ROM 6 : no issues\nNotes\n– Shoulder condition best in recent weeks\n– Session markedly smoother vs 1/30\n– High focus, low systemic cost\n– Clean close, no carryover warning\n⸻\n1/30 Fri — Push\nSession time: ~1h 04m\nWU (≈13′30″)\nFR full body\nHandstand ×2: 0 KU / 0 KU\nWall Extension 10×2: ROM normal → slight shoulder load\nBand Dislocate 10×2: very light L posterior echo, S2 resolved\nMini FSP:\nT.PL\ <script>
const STORAGE_KEY="nss77tr_record_v013_release";const DEFAULT=JSON.parse(document.getElementById("seedData").textContent||'{"blocks":[]}');let state=normalize(JSON.parse(JSON.stringify(DEFAULT)));
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)return normalize(JSON.parse(raw));}catch(e){}return normalize(JSON.parse(JSON.stringify(DEFAULT)));}

async function loadExternalState(){
  try{
    const res=await fetch("./record.json?v="+Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    return normalize(await res.json());
  }catch(err){
    console.warn("External record.json load failed:", err);
    return normalize(JSON.parse(JSON.stringify(DEFAULT)));
  }
}
async function initState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      state=normalize(JSON.parse(raw));
      return;
    }
  }catch(err){
    console.warn("Local record state load failed:", err);
  }
  state=await loadExternalState();
}

function normalize(s){s=s||{};s.blocks=Array.isArray(s.blocks)?s.blocks:[];s.blocks=s.blocks.map(b=>({id:b.id||uid(),month:String(b.month||"").trim(),title:String(b.title||"").trim(),text:String(b.text||""),createdAt:b.createdAt||new Date().toISOString(),updatedAt:b.updatedAt||b.createdAt||new Date().toISOString()}));return s;}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));scheduleRecordAutoSave();}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,9)}function todayMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function showView(name){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.getElementById("view-"+name)?.classList.add("active");render();}
function sortedBlocks(){return [...state.blocks].sort((a,b)=>String(b.month).localeCompare(String(a.month)))}function countSessions(text){return countMonthlyStats(text,"").sessions;}function wordCount(text){const s=String(text||"").trim();return s?s.split(/\s+/).length:0}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));}
function formatLogHtml(raw,query="",month=""){return formatRecordHtml(raw,query,month);}
function highlightQuery(html,query=""){
  if(!query || !query.trim()) return html;
  const q=escapeHtml(query.trim()).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return html.replace(new RegExp(q,"gi"),m=>`<mark>${m}</mark>`);
}
function isSummaryHeading(line){
  const s=String(line||"").trim();
  if(!s) return false;
  if(/^NSS-77TR\s+—\s+Monthly Core Summary/i.test(s)) return true;
  if(/^(Overall character of the month|Primary stage-transition lines|Signal \/ fatigue status|System interpretation|Monthly conclusion)$/i.test(s)) return true;
  if(/^(HSPU|Str\. FL Row|Adv\. 360 Pull|Complex Push \/ BAPL|Conditioning \/ Lower-chain line)$/i.test(s)) return true;
  if(/^(Current working hypothesis|Key changes|Key points|Most important improvement versus E1)$/i.test(s.replace(/:$/,""))) return true;
  if(s.endsWith(":") && s.length<72) return true;
  return false;
}
function cleanSummaryLineJoin(lines){
  const out=[];
  let para=[];
  const flush=()=>{
    if(para.length){
      let p=para.join(" ");
      p=p.replace(/\s+([,.;:])/g,"$1").replace(/\s+/g," ").trim();
      if(p) out.push({type:"p",text:p});
      para=[];
    }
  };
  for(const rawLine of lines){
    const line=String(rawLine||"").trim();
    if(!line){ flush(); continue; }
    if(/^NSS-77TR RECORD$/i.test(line) || /^⸻+$/.test(line)) continue;
    if(isSummaryHeading(line)){
      flush();
      out.push({type:"h",text:line.replace(/:$/,"")});
    }else{
      para.push(line);
    }
  }
  flush();
  return out;
}
function renderSummary(summaryText,query=""){
  const lines=String(summaryText||"").split(/\n/);
  const parts=cleanSummaryLineJoin(lines);
  if(!parts.length) return "";
  let html='<section class="summaryBlock">';
  for(const part of parts){
    if(part.type==="h"){
      html+=`<span class="summaryTitle">${escapeHtml(part.text)}</span>`;
    }else{
      html+=`<p class="summaryPara">${escapeHtml(part.text)}</p>`;
    }
  }
  html+='</section>';
  return highlightQuery(html,query);
}
function normalizeSessionSpacing(s){
  s=String(s||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();

  // Date line -> blank line -> Session time
  s=s.replace(/^(\d{1,2}\/\d{1,2}\s+[A-Za-z]{3}\s+—\s+.*)\n+(Session time:)/m,"$1\n$2");

  // Session time -> blank line -> WU
  s=s.replace(/^(Session time:.*)\n+(WU)$/m,"$1\n\n$2");

  // Primary section spacing: WU / MN / CD / Notes each gets one blank line before it.
  s=s.replace(/\n{1,}(WU|MN|CD|Notes)$/gm,"\n\n$1");

  // Keep common subsection headings close enough but still readable.
  s=s.replace(/\n{3,}/g,"\n\n");

  return s.trim();
}

function renderSessionBlock(sessionText,query=""){
  let s=normalizeSessionSpacing(sessionText);
  if(!s) return "";
  s=s.replace(/\n{3,}/g,"\n\n");
  s=escapeHtml(s);
  s=s.replace(/^(\d{1,2}\/\d{1,2}\s+[A-Za-z]{3}\s+—\s+.*)$/m,'<span class="sessionTitle">$1</span>');
  s=s.replace(/^(WU|MN|CD|Notes|MN Notes|WU Notes|CD Notes|MN Summary|Burpee 40×3|Burpee 40x3)$/gm,'<span class="section">$1</span>');
  
  s=s.replace(/^([A-Za-z0-9가-힣.\s+\/()×x·-]+(?:\s+\d\.\d.*?\[E\d+\].*)?)$/gm,(m)=>{
    const t=m.trim();
    if(!t || t.length>90) return m;
    if(t.startsWith(":")) return m;
    if(/^(&lt;|<)?span|^Session time:|^WU$|^MN$|^CD$|^Notes$/.test(t)) return m;
    if(/^\d{1,2}\/\d{1,2}\s+/.test(t)) return m;
    if(/^(S\d+|Rest|Passive ROM 6|Wall Extension|Band Dislocate|HVR|L Pull-up|HSPU|FR full body)/.test(t)){
      return `<strong>${m}</strong>`;
    }
    if(/\d\.\d/.test(t) || /Burpee 40/.test(t) || /Pull|Push|Pistol|Row|HSPU|BAPL|OAP|360/.test(t)){
      return `<strong>${m}</strong>`;
    }
    return m;
  });
  return `<section class="sessionBlock">${highlightQuery(s,query)}</section>`;
}
function splitRecord(raw,month=""){
  const text=String(raw||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();
  const mm=String(month||"").match(/^\d{4}-(\d{2})$/);
  const monthNum=mm ? String(Number(mm[1])) : "";
  const titleRe=/^\s*(\d{1,2})\/(\d{1,2})\s+[A-Za-z]{3}\s+[—-]\s*.+$/gm;
  const starts=[];
  let m;
  while((m=titleRe.exec(text))!==null){
    if(monthNum && String(Number(m[1]))!==monthNum) continue;
    starts.push({index:m.index,title:m[0].trim(),month:Number(m[1]),day:Number(m[2])});
  }
  if(!starts.length) return {summary:text,sessions:[]};
  const summary=text.slice(0,starts[0].index).trim();
  const sessions=[];
  for(let i=0;i<starts.length;i++){
    const start=starts[i].index;
    const end=i+1<starts.length ? starts[i+1].index : text.length;
    let block=text.slice(start,end).trim();
    block=block.replace(/^\s*⸻+\s*/,"").replace(/\s*⸻+\s*$/,"").trim();
    if(block) sessions.push(block);
  }
  return {summary,sessions};
}
function formatRecordHtml(raw,query="",month=""){
  const parsed=splitRecord(raw,month);
  let html='<article class="recordDoc">';
  const lines=String(parsed.summary||"").split(/\n/).map(x=>x.trim()).filter(Boolean);
  const header=lines.find(l=>/^NSS-77TR RECORD$/i.test(l));
  if(header) html+=`<div class="recordHeader">${escapeHtml(header)}</div><div class="recordTopDivider">⸻</div>`;
  html+=renderSummary(parsed.summary,query);
  if(parsed.sessions.length){
    html+='<div class="recordDivider">⸻</div>';
    html+=parsed.sessions.map(s=>renderSessionBlock(s,query)).join('<div class="recordDivider">⸻</div>');
  }
  html+='</article>';
  return html;
}

function daysInRecordMonth(month){
  const m=String(month||"").match(/^(\d{4})-(\d{2})$/);
  if(!m) return 0;
  return new Date(Number(m[1]), Number(m[2]), 0).getDate();
}
function firstSessionTitle(block){
  const m=String(block||"").trim().match(/^(\d{1,2}\/\d{1,2}\s+[A-Za-z]{3}\s+[—-]\s*.+)$/m);
  return m ? m[1].trim() : "";
}
function countMonthlyStats(text,month=""){
  const parsed=splitRecord(text,month);
  let sessions=0;
  let explicitRest=0;
  const seen=new Set();
  parsed.sessions.forEach(block=>{
    const title=firstSessionTitle(block);
    if(!title) return;
    const dm=title.match(/^(\d{1,2})\/(\d{1,2})/);
    const key=dm ? `${Number(dm[1])}/${Number(dm[2])}` : title;
    if(seen.has(key)) return;
    seen.add(key);
    if(/Rest\s*\/\s*Delay/i.test(title)) explicitRest++;
    else sessions++;
  });
  const days=daysInRecordMonth(month);
  let restDelay=explicitRest;
  if(explicitRest===0 && days>0){
    restDelay=Math.max(0,days-sessions);
  }
  return {sessions,restDelay,total:sessions+restDelay,explicitRest,days};
}
function statsLabel(text,month=""){
  const s=countMonthlyStats(text,month);
  return `${s.sessions} sessions · ${s.restDelay} rest/delay`;
}

function excerpt(text,n=180){const s=String(text||"").replace(/\s+/g," ").trim();return s.length>n?s.slice(0,n)+"…":s;}
function render(){renderDash();renderArchive();fillMonthFilter();fillExportRange();}
function renderDash(){
  const blocks=sortedBlocks();
  const el=document.getElementById("dashPlainStream");
  if(!el) return;
  if(!blocks.length){
    el.innerHTML='<div class="card">No records yet.</div>';
    return;
  }
  el.innerHTML=blocks.map(b=>{
    const title=escapeHtml(b.title||b.month||"UNTITLED");
    return `<section class="dashMonthBlock"><span class="dashMonthTitle">${title}</span>${formatRecordHtml(b.text,'',b.month)}</section>`;
  }).join("");
}
function fillMonthFilter(){const sel=document.getElementById("monthFilter");const cur=sel.value||"all";const months=[...new Set(sortedBlocks().map(b=>b.month).filter(Boolean))];sel.innerHTML='<option value="all">ALL MONTHS</option>'+months.map(m=>`<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");sel.value=months.includes(cur)?cur:"all";}
function blockCard(b,query=""){
  const stats=statsLabel(b.text,b.month);
  return `<div class="item"><div class="meta">${escapeHtml(b.month||"-")} · ${escapeHtml(stats)} · updated ${escapeHtml((b.updatedAt||"").slice(0,10))}</div><div class="title">${escapeHtml(b.title||b.month||"UNTITLED")}</div><div class="excerpt">${escapeHtml(excerpt(b.text))}</div><div class="actions"><button class="redbtn" onclick="viewBlock('${b.id}','${escapeHtml(query)}')">VIEW</button><button onclick="editBlock('${b.id}')">EDIT</button><button onclick="deleteBlock('${b.id}')">DELETE</button></div></div>`;
}
function renderArchive(){const q=document.getElementById("archiveSearch")?.value?.trim()||"";const mf=document.getElementById("monthFilter")?.value||"all";let blocks=sortedBlocks();if(mf!=="all")blocks=blocks.filter(b=>b.month===mf);if(q)blocks=blocks.filter(b=>(b.title+" "+b.month+" "+b.text).toLowerCase().includes(q.toLowerCase()));document.getElementById("archiveList").innerHTML=blocks.length?blocks.map(b=>blockCard(b,q)).join(""):'<div class="card"><h2>EMPTY</h2>No matching records.</div>';}
function renderSearch(scope){const input=document.getElementById(scope==="dash"?"dashSearch":"archiveSearch");const out=document.getElementById(scope==="dash"?"dashResults":"archiveList");if(!input||!out)return;const q=input.value.trim();if(!q){if(scope==="dash")out.innerHTML="";return;}const blocks=sortedBlocks().filter(b=>(b.title+" "+b.month+" "+b.text).toLowerCase().includes(q.toLowerCase()));out.innerHTML=blocks.length?blocks.map(b=>blockCard(b,q)).join(""):'<div class="item">No matches.</div>';}
function viewBlock(id,query=""){const b=state.blocks.find(x=>x.id===id);if(!b)return;showView("archive");document.getElementById("archiveList").innerHTML=`<div class="card"><h2>${escapeHtml(b.title||b.month)}</h2><div class="item"><div class="meta">${escapeHtml(b.month)} · ${escapeHtml(statsLabel(b.text,b.month))}</div></div><div class="logbody" style="margin-top:12px">${formatLogHtml(b.text,query,b.month)}</div><div class="actions"><button class="redbtn" onclick="editBlock('${b.id}')">EDIT</button><button onclick="renderArchive()">BACK</button><button onclick="copyBlock('${b.id}')">COPY</button></div></div>`;}
function editBlock(id){const b=state.blocks.find(x=>x.id===id);if(!b)return;document.getElementById("editId").value=b.id;document.getElementById("monthInput").value=b.month;document.getElementById("titleInput").value=b.title;document.getElementById("textInput").value=b.text;showView("log");}
function clearEditor(){document.getElementById("editId").value="";document.getElementById("monthInput").value=todayMonth();document.getElementById("titleInput").value="";document.getElementById("textInput").value="";}
function saveBlock(){const id=document.getElementById("editId").value;const month=document.getElementById("monthInput").value.trim()||todayMonth();const title=document.getElementById("titleInput").value.trim()||month;const text=document.getElementById("textInput").value;if(!text.trim()){toast("Text is empty");return}const now=new Date().toISOString();if(id){const b=state.blocks.find(x=>x.id===id);if(b)Object.assign(b,{month,title,text,updatedAt:now});}else{state.blocks.push({id:uid(),month,title,text,createdAt:now,updatedAt:now});}saveState();clearEditor();render();showView("archive");toast("Record saved");}
function deleteBlock(id){if(!confirm("Delete this record block?"))return;state.blocks=state.blocks.filter(b=>b.id!==id);saveState();render();toast("Deleted");}
async function copyBlock(id){const b=state.blocks.find(x=>x.id===id);if(!b)return;await navigator.clipboard.writeText(b.text);toast("Copied");}
function allText(){return sortedBlocks().map(b=>`${b.title||b.month}\n\n${b.text.trim()}`).join("\n\n⸻\n\n");}
async function copyAllText(){await navigator.clipboard.writeText(allText());toast("All text copied");}
function fillExportRange(){
  const sel=document.getElementById("exportRange");
  if(!sel) return;
  const cur=sel.value||"all";
  const months=[...new Set(sortedBlocks().map(b=>b.month).filter(Boolean))];
  sel.innerHTML='<option value="all">ALL MONTHS</option>'+months.map(m=>`<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");
  sel.value=months.includes(cur)?cur:"all";
}
function selectedExportBlocks(){
  const sel=document.getElementById("exportRange");
  const value=sel ? sel.value : "all";
  const blocks=sortedBlocks();
  if(!value || value==="all") return blocks;
  return blocks.filter(b=>b.month===value);
}
function selectedExportState(){
  return {...state, blocks:selectedExportBlocks()};
}

function exportJson(){const exportState=selectedExportState();const suffix=(document.getElementById("exportRange")?.value||"all").replace(/[^0-9A-Za-z_-]/g,"_");downloadBlob(new Blob([JSON.stringify(exportState,null,2)],{type:"application/json"}),`nss77tr_record_${suffix}_${new Date().toISOString().slice(0,10)}.json`);}
function exportText(){downloadBlob(new Blob([allText()],{type:"text/plain"}),`nss77tr_record_export_${new Date().toISOString().slice(0,10)}.txt`);}

function downloadBlob(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}
function importJson(ev){const file=ev.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{state=normalize(JSON.parse(reader.result));saveState();render();toast("Imported");}catch(e){toast("Import failed")}};reader.readAsText(file);ev.target.value="";}
function resetAll(){if(!confirm("Reset all local records?"))return;localStorage.removeItem(STORAGE_KEY);state=normalize(JSON.parse(JSON.stringify(DEFAULT)));render();toast("Reset");}

const SYNC_API_URL="https://nsd-6-sync-api.vercel.app/api/sync";
const SYNC_KEY_STORAGE="nsd6_sync_key";
function initRecordSyncKey(){
  const el=document.getElementById("recordSyncKey");
  if(el) el.value=localStorage.getItem(SYNC_KEY_STORAGE)||"";
}
function saveRecordSyncKey(){
  const el=document.getElementById("recordSyncKey");
  if(el) localStorage.setItem(SYNC_KEY_STORAGE, el.value.trim());
}
function getRecordSyncKey(){
  const el=document.getElementById("recordSyncKey");
  const key=(el&&el.value.trim()) || localStorage.getItem(SYNC_KEY_STORAGE) || "";
  if(key) localStorage.setItem(SYNC_KEY_STORAGE,key);
  return key;
}

const SYNC_AUTO_STORAGE="nsd6_auto_sync";
let recordAuthLoadTimer=null;
let recordSyncHydrating=false;
let recordAutoSaveTimer=null;
function isRecordAutoSyncOn(){return !!getRecordSyncKey();}
function setRecordAutoSyncUI(ok=false){
  const el=document.getElementById("recordAutoSyncText");
  if(!el) return;
  el.classList.toggle("ok", !!ok);
}
function scheduleRecordAuthLoad(){
  clearTimeout(recordAuthLoadTimer);
  recordAuthLoadTimer=setTimeout(()=>{ if(getRecordSyncKey()) loadRecordCloud(true); else setRecordAutoSyncUI(false); }, 700);
}

function scheduleRecordAutoSave(){
  if(recordSyncHydrating || !isRecordAutoSyncOn()) return;
  const key=getRecordSyncKey();
  if(!key) return;
  clearTimeout(recordAutoSaveTimer);
  recordAutoSaveTimer=setTimeout(()=>saveRecordCloud(true), 900);
}

async function loadRecordCloud(silent=false){
  try{
    if(!silent) toast("Loading...");
    const res=await fetch(SYNC_API_URL+"?target=record",{method:"GET"});
    const json=await res.json();
    if(!res.ok || !json.ok) throw new Error(json.error||("HTTP "+res.status));
    recordSyncHydrating=true;
    state=normalize(json.data);
    saveState();
    recordSyncHydrating=false;
    render();
    initRecordSyncKey();
    setRecordAutoSyncUI(true);
    toast(silent ? "Auto synced" : "Loaded");
  }catch(err){
    console.error(err);
    setRecordAutoSyncUI(false); toast("Load failed · "+String(err.message||err).slice(0,42));
  }
}
async function saveRecordCloud(silent=false){
  const key=getRecordSyncKey();
  if(!key){toast("SYNC KEY missing");return;}
  try{
    if(!silent) toast("Saving...");
    const res=await fetch(SYNC_API_URL+"?target=record",{method:"POST",headers:{"Content-Type":"application/json","X-Sync-Key":key},body:JSON.stringify({target:"record",data:state})});
    const json=await res.json();
    if(!res.ok || !json.ok) throw new Error(json.error||("HTTP "+res.status));
    setRecordAutoSyncUI(true); toast(silent ? "Auto synced" : "Saved cloud");
  }catch(err){
    console.error(err);
    setRecordAutoSyncUI(false); toast("Save failed · "+String(err.message||err).slice(0,42));
  }
}

function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1400);}
function setScale(){const stage=document.getElementById("stage");const rect=stage.getBoundingClientRect();document.documentElement.style.setProperty("--scale",rect.width/941);}
window.addEventListener("resize",setScale);window.addEventListener("orientationchange",()=>setTimeout(setScale,250));initState().then(async()=>{ clearEditor(); setScale(); render(); initRecordSyncKey(); setRecordAutoSyncUI(false); await loadRecordCloud(true); });
</script>
