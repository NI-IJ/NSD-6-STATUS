<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.webmanifest" />
<title>NSD-6 STATUS CONTROL</title>
<style>
:root{
  --scale:1;
  --red:#ff1118;
  --green:rgb(20,255,70);
  --text:#f2f2f2;
  --muted:#9c9ca2;
  --line:#33343a;
  --font-din:"DIN", "DIN Medium", "DIN Alternate", "Arial Narrow", "Roboto Condensed", "Helvetica Neue", Arial, sans-serif;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:var(--text);font-family:var(--font-ui)}
button,input,select,textarea{font:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
.stage{position:relative;width:min(100vw,941px);margin:0 auto;background:#000}
.skin{display:block;width:100%;height:auto;user-select:none;pointer-events:none}
.layer{position:absolute;inset:0;z-index:2}
.hotspot{position:absolute;border:0;padding:0;background:transparent;color:transparent}
.hotspot:active{background:rgba(255,255,255,.03)}
.txt{
  position:absolute;
  font-family:var(--font-din);
  font-weight:500;
  line-height:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
  letter-spacing:.018em;
  color:var(--text);
}
.mono{font-family:var(--font-mono)}
.red{color:var(--red)}
.muted{color:var(--muted)}
.center{text-align:center}
.preview{position:absolute;font-family:var(--font-mono);font-size:calc(13px * var(--scale));line-height:1.32;white-space:pre-wrap;overflow:hidden;color:#e9e9e9;pointer-events:none}

/* 941 × 1640 pixel coordinate overlay. Tune these numbers directly if needed. */
#ovExposure{left:calc(96.5px * var(--scale));top:calc(314px * var(--scale));width:calc(70px * var(--scale));font-size:calc(39px * var(--scale));color:#ff0000;text-align:center}
#ovSlot{left:calc(191px * var(--scale));top:calc(290px * var(--scale));width:calc(100px * var(--scale));font-size:calc(15px * var(--scale));color:var(--muted)}
#ovCategory{left:calc(191px * var(--scale));top:calc(315px * var(--scale));width:calc(340px * var(--scale));font-size:calc(22px * var(--scale));color:var(--text)}

#ovMovement{left:calc(249px * var(--scale));top:calc(491px * var(--scale));width:calc(360px * var(--scale));font-size:calc(18px * var(--scale));color:var(--text)}
#ovRotation{left:calc(250px * var(--scale));top:calc(553px * var(--scale));width:calc(260px * var(--scale));font-size:calc(17px * var(--scale));color:var(--text)}
#ovPrevious{left:calc(252px * var(--scale));top:calc(617px * var(--scale));width:calc(360px * var(--scale));font-size:calc(17px * var(--scale));color:var(--text)}
#ovLastSaved{left:calc(252px * var(--scale));top:calc(679px * var(--scale));width:calc(360px * var(--scale));font-size:calc(17px * var(--scale));color:var(--text)}

#ovMonth{left:calc(757px * var(--scale));top:calc(1068px * var(--scale));width:calc(96px * var(--scale));font-size:calc(14px * var(--scale));color:var(--text);text-align:right}
#ovSessions{left:calc(170px * var(--scale));top:calc(1130px * var(--scale));width:calc(54px * var(--scale));font-size:calc(35px * var(--scale));color:var(--text);text-align:center}
#ovRests{left:calc(460px * var(--scale));top:calc(1130px * var(--scale));width:calc(54px * var(--scale));font-size:calc(35px * var(--scale));color:var(--text);text-align:center}
#ovStreak{left:calc(727px * var(--scale));top:calc(1130px * var(--scale));width:calc(54px * var(--scale));font-size:calc(35px * var(--scale));color:var(--text);text-align:center}

#ovPreview{left:calc(84px * var(--scale));top:calc(1376px * var(--scale));width:calc(760px * var(--scale));height:calc(78px * var(--scale))}
#ovBuild{left:calc(105px * var(--scale));top:calc(1597px * var(--scale));width:calc(170px * var(--scale));font-size:calc(13px * var(--scale));color:#ff0000;text-align:left}

/* Hotspots */
#hsDash{left:6.8%;top:8.75%;width:13.7%;height:3.1%}
#hsPlan{left:25.8%;top:8.75%;width:12.7%;height:3.1%}
#hsLog{left:44.3%;top:8.75%;width:13.0%;height:3.1%}
#hsHist{left:62.8%;top:8.75%;width:13.8%;height:3.1%}
#hsSet{left:81.2%;top:8.75%;width:12.0%;height:3.1%}
#hsGenerateMain{left:4.8%;top:52.1%;width:89.8%;height:6.4%;z-index:5}
#hsAdvance{left:5.8%;top:59.38%;width:42.7%;height:5.45%}
#hsRest{left:50.4%;top:59.38%;width:42.7%;height:5.45%}
#hsEditTemplate{left:70.7%;top:81.65%;width:22.2%;height:2.7%}
#hsGenerateBottom{left:4.8%;top:91.35%;width:30.0%;height:5.2%;z-index:5}
#hsCopy{left:35.1%;top:91.85%;width:27.0%;height:4.42%}
#hsSaveBottom{left:63.3%;top:91.85%;width:29.8%;height:4.42%}

.panel{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));overflow:auto}
.panel.active{display:block}
.card{width:min(920px,100%);margin:0 auto 16px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0a0a0c,#030303);padding:16px;box-shadow:0 0 30px rgba(255,0,0,.12)}
.panel-title{margin:0 0 14px;color:var(--red);font-family:var(--font-din);font-weight:500;font-size:20px;letter-spacing:.08em}
label{display:block;color:var(--muted);font-family:var(--font-din);margin:12px 0 7px;font-size:13px}
textarea,input,select{width:100%;border:1px solid var(--line);border-radius:10px;background:#030303;color:#fff;padding:12px;outline:none;font-family:var(--font-mono);font-size:14px}
textarea{min-height:220px;resize:vertical;line-height:1.45}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.actions button,.panel-btn{min-height:48px;border:1px solid var(--line);border-radius:10px;background:#050505;color:#fff;font-family:var(--font-din);font-weight:500}
.actions .redbtn,.panel-btn.redbtn{background:linear-gradient(180deg,#f00909,#9f0000);border-color:#ff1f1f}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.list{display:grid;gap:10px}
.logitem{border:1px solid var(--line);border-radius:12px;background:#060606;padding:12px}
.logitem h3{margin:0 0 8px;font-family:var(--font-din);font-size:15px;font-weight:500}
.logitem pre{margin:0;white-space:pre-wrap;color:#d8d8d8;font-family:var(--font-mono);font-size:12px;line-height:1.42;max-height:170px;overflow:auto}
.panel-headline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.panel-headline .panel-title{margin:0;color:var(--red);font-family:var(--font-din);font-weight:500;font-size:20px;letter-spacing:.08em}
.mini-close{border:1px solid var(--line);border-radius:999px;background:#050505;color:#fff;padding:8px 14px;font-family:var(--font-din)}
.history-card{max-height:92vh;overflow:auto}
#historyList{max-height:68vh;overflow-y:auto;padding-right:4px}
.logitem pre{max-height:320px;overflow:auto}
.toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:30;opacity:0;transition:.18s;border:1px solid #444;border-radius:999px;background:#111;color:#fff;padding:11px 16px;font-family:var(--font-din)}
.toast.show{opacity:1}
@media(max-width:700px){.actions{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="stage" id="stage">
  <img src="BASE.png" class="skin" alt="NSD-6 STATUS CONTROL" />
  <div class="layer">
    <div id="ovExposure" class="txt">E1</div>
    <div id="ovSlot" class="txt">PULL</div>
    <div id="ovCategory" class="txt">HORIZONTAL PULL</div>

    <div id="ovMovement" class="txt">-</div>
    <div id="ovRotation" class="txt">-</div>
    <div id="ovPrevious" class="txt">-</div>
    <div id="ovLastSaved" class="txt">-</div>

    <div id="ovMonth" class="txt">MAY 2026</div>
    <div id="ovSessions" class="txt">0</div>
    <div id="ovRests" class="txt">0</div>
    <div id="ovStreak" class="txt">0</div>
    <div id="ovPreview" class="preview">Generate a runtime prompt first.</div>
    <div id="ovBuild" class="txt">V4.11</div>

    <button id="hsDash" class="hotspot" onclick="closePanels()">Dash</button>
    <button id="hsPlan" class="hotspot" onclick="openPanel('planPanel')">Plan</button>
    <button id="hsLog" class="hotspot" onclick="openPanel('savePanel')">Log</button>
    <button id="hsHist" class="hotspot" onclick="openPanel('historyPanel')">Hist</button>
    <button id="hsSet" class="hotspot" onclick="openPanel('settingsPanel')">Set</button>
    <button id="hsGenerateMain" class="hotspot" onclick="generatePrompt()">Generate</button>
    <button id="hsAdvance" class="hotspot" onclick="advanceRotation()">Advance</button>
    <button id="hsRest" class="hotspot" onclick="markRest()">Rest</button>
    <button id="hsEditTemplate" class="hotspot" onclick="openPanel('settingsPanel')">Edit</button>
    <button id="hsGenerateBottom" class="hotspot" onclick="generatePrompt()">Generate</button>
    <button id="hsCopy" class="hotspot" onclick="copyPrompt()">Copy</button>
    <button id="hsSaveBottom" class="hotspot" onclick="openPanel('savePanel')">Save</button>
  </div>
</div>

<section id="planPanel" class="panel">
  <div class="card">
    <h2 class="panel-title">RUNTIME PROMPT</h2>
    <textarea id="runtimePrompt" placeholder="Generate Runtime Prompt"></textarea>
    <div class="actions">
      <button class="redbtn" onclick="generatePrompt()">GENERATE</button>
      <button onclick="copyPrompt()">COPY</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
  </div>
</section>
<section id="savePanel" class="panel">
  <div class="card">
    <h2 class="panel-title">SAVE FINAL LOG</h2>
    <div class="formgrid">
      <div><label>Date</label><input id="logDate" type="date" /></div>
      <div><label>Result</label><select id="result"><option>Completed</option><option>Repeat Same</option><option>Rest / Delay</option></select></div>
    </div>
    <label>Final log text</label>
    <textarea id="finalLog" placeholder="Paste Kai final log here"></textarea>
    <div class="actions">
      <button class="redbtn" onclick="saveFinalLog()">SAVE SESSION</button>
      <button onclick="document.getElementById('finalLog').value=''">CLEAR</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
  </div>
</section>
<section id="historyPanel" class="panel">
  <div class="card history-card">
    <div class="panel-headline"><h2 class="panel-title">HISTORY</h2><button class="mini-close" onclick="closePanels()">CLOSE</button></div>
    <div class="formgrid">
      <div><label>Line filter</label><select id="filter" onchange="renderHistory()"><option value="all">All</option></select></div>
      <div><label>Search</label><input id="search" oninput="renderHistory()" placeholder="FL Row, Burpee, 5/25" /></div>
    </div>
    <div class="list" id="historyList"></div>
    <div class="actions">
      <button onclick="exportData()">BACKUP</button>
      <button onclick="document.getElementById('importFile').click()">IMPORT</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
    <input id="importFile" type="file" accept="application/json" hidden onchange="importData(event)" />
  </div>
</section>
<section id="settingsPanel" class="panel">
  <div class="card">
    <h2 class="panel-title">SETTINGS</h2>
    <label>Rotation index</label>
    <input type="number" id="rotationIndex" min="0">
    <label>Rotation JSON</label>
    <textarea id="rotationJson"></textarea>
    <button class="panel-btn redbtn" onclick="saveRotation()">SAVE ROTATION</button>
    <label>Lines JSON</label>
    <textarea id="linesJson"></textarea>
    <button class="panel-btn redbtn" onclick="saveLines()">SAVE LINES</button>
    <div class="actions">
      <button onclick="exportData()">EXPORT</button>
      <button onclick="resetAll()">RESET</button>
      <button onclick="closePanels()">CLOSE</button>
    </div>
  </div>
</section>
<div id="toast" class="toast">Saved</div>

const LEGACY_KEYS = ["nsd6_v0411","nsd6_v0410","nsd6_v049","nsd6_v048","nsd6_v047","nsd6_v046","nsd6_v045","nsd6_v044","nsd6_v043","nsd6_v042","nsd6_v041","nsd6_v03","nsd6_v02"];
function clone(o){return JSON.parse(JSON.stringify(o))}
function deepMerge(base, incoming){const out=clone(base); if(!incoming||typeof incoming!=="object") return out; Object.keys(incoming).forEach(k=>{if(incoming[k]&&typeof incoming[k]==="object"&&!Array.isArray(incoming[k])&&out[k]&&typeof out[k]==="object"&&!Array.isArray(out[k])) out[k]=deepMerge(out[k],incoming[k]); else out[k]=incoming[k];}); return out;}
function applyDefaults(state){const out=deepMerge(DEFAULT,state||{}); out.rotation=clone(DEFAULT.rotation); Object.keys(DEFAULT.lines).forEach(key=>{out.lines[key]={...(out.lines[key]||{}),...DEFAULT.lines[key]}}); if(!Number.isInteger(out.rotationIndex)) out.rotationIndex=0; out.rotationIndex=((out.rotationIndex%out.rotation.length)+out.rotation.length)%out.rotation.length; return out;}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY)||LEGACY_KEYS.map(k=>localStorage.getItem(k)).find(Boolean); return raw?applyDefaults(JSON.parse(raw)):clone(DEFAULT)}catch(e){return clone(DEFAULT)}}
let state = load();
function persist(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state))}
function updateScale(){const stage=document.getElementById("stage"); const scale=stage.getBoundingClientRect().width/941; document.documentElement.style.setProperty("--scale", scale.toFixed(6));}
window.addEventListener("resize", updateScale);
window.addEventListener("orientationchange", updateScale);
function todayISO(){const d=new Date();const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10)}
function week(d){return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d+"T00:00:00").getDay()]}
function titleDate(d){const x=new Date(d+"T00:00:00");return `${x.getMonth()+1}/${x.getDate()} ${week(d)}`;}
function nextMeta(){const idx=((state.rotationIndex%state.rotation.length)+state.rotation.length)%state.rotation.length; const r=state.rotation[idx]; return {...r,...(state.lines[r.lineKey]||{}),rotIndex:idx};}
function logTime(l){return (l.date||"") + "T00:00:00"}
function sortedLogs(){return [...state.logs].sort((a,b)=>logTime(a).localeCompare(logTime(b)) || String(a.id||"").localeCompare(String(b.id||"")))}
function workoutLogs(){return sortedLogs().filter(l=>l.result!=="Rest / Delay")}
function previousLog(meta){return [...workoutLogs()].reverse().find(l=>l.lineKey===meta.lineKey);}
function lastSaved(){return [...sortedLogs()].reverse().find(l=>l.result !== "Rest / Delay") || sortedLogs().at(-1) || null;}
function formatLastSaved(log){if(!log) return "-"; return `${log.date} · ${log.exercise || log.slot || "Session"}`;} · ${log.exercise || log.slot || "Session"}`;
}
function buildPlan(meta,d=todayISO()){return `${titleDate(d)} — ${meta.slot}

Session time: ~

WU
FR full body
HSPU ×3
Wall Extension 10×2
Band Dislocate 10×2
Static Position
: ${meta.staticPosition || "___ / Adv. L-sit 6s"} —
L Pull-up 5×1

MN
${meta.mainTemplate || `${meta.exercise} ${meta.progress}\n:`}

CD
HVR 10×1
Wall Extension 10×1
Band Dislocate
: dorsal 6×1 —
: overgrip 6×1 —
Passive ROM 6

Notes
:`;}
function render(){
  const meta=nextMeta();
  const prev=previousLog(meta);
  text("ovExposure",meta.exposure||"E");
  text("ovSlot",(meta.slot||"-").toUpperCase());
  text("ovCategory",(meta.category||"-").toUpperCase());
  text("ovMovement", `${meta.exercise || "-"} ${meta.progress || ""}`.trim());
  text("ovRotation", `SESSION ${meta.rotIndex + 1} / ${state.rotation.length}`);
  text("ovPrevious", prev ? `${prev.exercise} ${prev.progress}` : "-");
  text("ovLastSaved", formatLastSaved(lastSaved()));

  const now=new Date();
  text("ovMonth", now.toLocaleString("en",{month:"short"}).toUpperCase()+" "+now.getFullYear());
  const ym=todayISO().slice(0,7);
  const month=sortedLogs().filter(l=>(l.date||"").startsWith(ym));
  text("ovSessions", month.filter(l=>l.result!=="Rest / Delay").length);
  text("ovRests", month.filter(l=>l.result==="Rest / Delay").length);
  let streak=0;
  for(const l of [...month].reverse()){if(l.result==="Rest / Delay") break; streak++;}
  text("ovStreak", streak);
  text("ovBuild", "V4.12");
  document.getElementById("logDate").value ||= todayISO();
  fillFilters(); fillSettings(); renderHistory();
}
function text(id,v){const el=document.getElementById(id); if(el) el.textContent=v}
function generatePrompt(){const meta=nextMeta(); const prev=previousLog(meta); const prompt=`${prev ? prev.logText : `[No previous ${meta.exercise} log saved yet.]`}

⸻

${buildPlan(meta)}

⸻`; document.getElementById("runtimePrompt").value=prompt; document.getElementById("ovPreview").textContent=prompt.split("\n").slice(0,5).join("\n"); openPanel("planPanel"); toast("Generate button works · prompt ready");}
async function copyPrompt(){let t=document.getElementById("runtimePrompt").value; if(!t.trim()){const meta=nextMeta(); const prev=previousLog(meta); t=`${prev ? prev.logText : `[No previous ${meta.exercise} log saved yet.]`}

⸻

${buildPlan(meta)}

⸻`; document.getElementById("runtimePrompt").value=t; document.getElementById("ovPreview").textContent=t.split("\n").slice(0,5).join("\n");} try{await navigator.clipboard.writeText(t); toast("Copied")}catch(e){toast("Copy failed")}}
function saveFinalLog(){const meta=nextMeta(); const txt=document.getElementById("finalLog").value.trim(); const result=document.getElementById("result").value; if(!txt && result!=="Rest / Delay"){toast("Paste final log first"); return;} const date=document.getElementById("logDate").value || todayISO(); state.logs.push({id:String(Date.now())+Math.random().toString(16).slice(2),date,result,slot:meta.slot,lineKey:meta.lineKey,category:meta.category,exercise:meta.exercise,progress:meta.progress,logText:txt || `${titleDate(date)} — Rest / Delay

${meta.slot} / ${meta.exercise} delayed.`}); if(result==="Completed") state.rotationIndex=(state.rotationIndex+1)%state.rotation.length; document.getElementById("finalLog").value=""; persist(); render(); closePanels(); toast("Session saved");}
function advanceRotation(){state.rotationIndex=(state.rotationIndex+1)%state.rotation.length; persist(); render(); toast("Rotation advanced")}
function markRest(){const meta=nextMeta(); const date=todayISO(); state.logs.push({id:String(Date.now()),date,result:"Rest / Delay",slot:meta.slot,lineKey:meta.lineKey,category:meta.category,exercise:meta.exercise,progress:meta.progress,logText:`${titleDate(date)} — Rest / Delay\n\n${meta.slot} / ${meta.exercise} delayed.`}); persist(); render(); toast("Rest / Delay saved");}
function openPanel(id){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active")); document.getElementById(id).classList.add("active");}
function closePanels(){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));}
function fillFilters(){const f=document.getElementById("filter"); if(!f) return; const old=f.value||"all"; f.innerHTML='<option value="all">All</option>'+Object.entries(state.lines).map(([k,v])=>`<option value="${k}">${v.category} — ${v.exercise}</option>`).join(""); f.value=old;}
function renderHistory(){const list=document.getElementById("historyList"); if(!list) return; const f=document.getElementById("filter")?.value||"all"; const q=(document.getElementById("search")?.value||"").toLowerCase(); const logs=[...sortedLogs()].reverse().filter(l=>(f==="all"||l.lineKey===f)&&JSON.stringify(l).toLowerCase().includes(q)); list.innerHTML = logs.length ? "" : '<div class="logitem">No logs yet.</div>'; logs.slice(0,120).forEach(l=>{const div=document.createElement("div"); div.className="logitem"; div.innerHTML=`<h3>${esc(l.date)} · ${esc(l.exercise)} · ${esc(l.result)}</h3><div class="muted">${esc(l.category||"")} · ${esc(l.progress||"")}</div><pre>${esc((l.logText||"").split("
").slice(0,20).join("
"))}</pre><div class="actions"><button onclick="copyLog('${l.id}')">COPY</button><button onclick="deleteLog('${l.id}')">DELETE</button><button onclick="reuseLog('${l.id}')">USE AS PREV</button></div>`; list.appendChild(div);});}
async function copyLog(id){const l=state.logs.find(x=>x.id===id); if(!l) return; await navigator.clipboard.writeText(l.logText); toast("Log copied");}
function reuseLog(id){const l=state.logs.find(x=>x.id===id); if(!l) return; document.getElementById("runtimePrompt").value=`${l.logText}

⸻

${buildPlan(nextMeta())}

⸻`; openPanel("planPanel"); toast("Loaded");}
function deleteLog(id){if(!confirm("Delete this log?")) return; state.logs=state.logs.filter(x=>x.id!==id); persist(); render(); toast("Deleted");}
function fillSettings(){document.getElementById("rotationIndex").value=state.rotationIndex; document.getElementById("rotationJson").value=JSON.stringify(state.rotation,null,2); document.getElementById("linesJson").value=JSON.stringify(state.lines,null,2);}
function saveRotation(){try{state.rotationIndex=Number(document.getElementById("rotationIndex").value)||0; state.rotation=JSON.parse(document.getElementById("rotationJson").value); persist(); render(); toast("Rotation saved");}catch(e){toast("Invalid JSON")}}
function saveLines(){try{state.lines=JSON.parse(document.getElementById("linesJson").value); persist(); render(); toast("Lines saved");}catch(e){toast("Invalid JSON")}}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)], {type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`nsd6_backup_${todayISO()}.json`; a.click(); URL.revokeObjectURL(a.href);}
function importData(e){const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{try{state=applyDefaults(JSON.parse(r.result)); persist(); render(); toast("Imported");}catch(err){toast("Import failed")}}; r.readAsText(file);}
function resetAll(){if(!confirm("Reset app data? Export backup first.")) return; state=clone(DEFAULT); persist(); render(); toast("Reset");}
function esc(s){return String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));}
function toast(msg){const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 1400);}
if("serviceWorker" in navigator){window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
updateScale(); render();
</script>
</body>
</html>
